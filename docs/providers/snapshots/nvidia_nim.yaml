notes: "PROBE 2026-07-19: meta/llama-3.3-70b-instruct timed out after 91.8s. Research confirms this is a known, recurring issue on NVIDIA Developer Forums (not a status-page outage — status.ngc.nvidia.com showed no active incident) — multiple 2026 threads report free-tier latency spikes up to ~3 minutes under load, with some models (e.g. DeepSeek) failing over half the time. Treat build.nvidia.com's free tier as best-effort/expect-timeouts-under-load rather than production-reliable; reliability flags updated accordingly. No deprecation found for nemotron-3-ultra-550b-a55b — still listed and documented. Added Nemotron 3 Ultra (nvidia/nemotron-3-ultra-550b-a55b): 550B total, 55B active, 1M context, hybrid Mamba-Transformer MoE, launched June 4 2026 at Computex. Catalog now 100+ models. Tool calling confirmed on many models. 200 RPM upgrade requests via forum are common but staff note the forum thread itself does not grant increases — 40 RPM remains the practical free-tier ceiling. Credits do not refill — best for prototyping. Developer Program grants 5000 additional credits."
