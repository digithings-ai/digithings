notes: "MATERIAL CHANGE 2026-07-19: GitHub confirmed (github.blog changelog) that GitHub Models is being FULLY RETIRED 2026-07-30 — this supersedes the June billing-change note below. Timeline: 2026-06-01 pay-as-you-go launched; 2026-06-16 blocked for new customers/orgs; 2026-07-01 full retirement announced for 2026-07-30 (11 days from this check); brownouts scheduled 2026-07-16 and 2026-07-23. PROBE 2026-07-19: gpt-4o-mini returned 401 'The `models` permission is required' — root cause confirmed via GitHub Docs: API access requires a token with `models:read` scope explicitly declared (fine-grained PAT, or `permissions: { models: read }` in an Actions workflow); the default Actions GITHUB_TOKEN does NOT carry this by default (contradicts this snapshot's prior claim that GITHUB_TOKEN 'always available — no extra secret needed'). Given the 11-day runway to full retirement, recommend NOT investing in an auth fix — instead plan removal of github_models from the DigiThings provider roster and migrate any dependent config to another provider before 2026-07-30. Catalog was expanded to 45+ models (DeepSeek, Phi-4, AI21 Jamba) prior to the retirement announcement — now moot."
