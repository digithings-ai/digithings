notes: "MATERIAL CHANGE 2026-07-19: plain 'sonar-reasoning' ($1/$5) no longer appears in current Perplexity pricing docs — only 'sonar-reasoning-pro' ($2/$8) is listed; treated as a rename/consolidation and updated accordingly (verify next cycle). Added sonar-pro ($3/$15), which was previously undocumented in this snapshot despite appearing on the official pricing page. STRATEGIC SIGNAL: the Sonar API quickstart page now states the Sonar API is 'in maintenance mode' — Perplexity is steering new integrations to a new Agent API (orchestrates OpenAI/Anthropic/Google/xAI models at direct provider rates plus Perplexity presets/web search/tools). Sonar models remain supported/priced for existing integrations, but this signals future deprecation risk — worth monitoring. Real-time web search grounded responses — unique for news flow and market data research. Not suitable for tool calling or JSON extraction. sonar-deep-research ($2/$8, 128K ctx) — multi-step agentic research, citation tokens $2/1M, reasoning tokens $3/1M, search queries $5/1K; typical cost $0.30-$1.30/query. Request fees: sonar $5-12/1K requests, sonar-pro $6-14/1K. Agentic Research API: access OpenAI/Anthropic/Google at direct rates + $0.005/web search. No key configured yet; no probe run (method: skipped)."
