notes: "MATERIAL CHANGE 2026-07-19: official rate-limits doc (docs.sambanova.ai/docs/en/models/rate-limits) now shows a materially narrower free-tier model roster — only Meta-Llama-3.3-70B-Instruct, DeepSeek-V3.1, gpt-oss-120b (production) plus DeepSeek-V3.2, gemma-4-31B-it (preview) are listed. Llama-4-Scout, Llama-4-Maverick, DeepSeek-R1, MiniMax-M2.7 (now Developer-tier-only paid), and Qwen3-32B all dropped from the free table — marked deprecated above rather than deleted, pending reconfirmation. Also newly recorded: the free tier has a 20 RPD (requests/day) cap in addition to 20 RPM — this is a much harder ceiling than RPM alone implies, and 200,000 TPD (no dedicated schema field; recorded here in notes). Llama-4-Scout/Maverick paid pricing ($0.40/$0.70, $0.63/$1.80) still corroborated by third-party sources but could not be found in the current official rate-limit table's live model list — worth verifying they're still live SKUs at all. Developer (paid) tier confirmed: 20M tokens/day cap across all models, per-model RPM/RPD varies (Llama-3.3-70B: 240 RPM/48,000 RPD; others: 60 RPM/12,000 RPD). Tool calling + structured output confirmed on all models. Responses API (OpenAI format) launched May 11 2026. Fast RDU inference. No key configured yet; no probe run (method: skipped)."
