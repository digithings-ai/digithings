notes: "PROBE 2026-07-19: probe against rnj-1:cloud returned 404 model not found. Research confirms rnj-1:cloud never existed as a valid cloud-tier id — 'rnj-1' (Essential AI, 8B dense) is a local-only model on Ollama's library (tags: rnj-1:latest, rnj-1:8b, rnj-1:8b-instruct-*); it does not appear anywhere in Ollama's current cloud-tagged catalog. REMOVED from this snapshot's free_tier.models as a data-quality correction, not a deprecation — flag for whoever owns config/litellm.yaml's `ollama-cloud/rnj-1` probe alias mapping, since it points at a model id that was never valid. Current live cloud catalog (fetched directly) includes: gemma4, qwen3.5, glm-5.1/5.2, minimax-m2.5/m2.7/m3, nemotron-3-super/ultra/nano, kimi-k2.5/k2.6/k2.7-code, deepseek-v4-flash/pro, gpt-oss, gemini-3-flash-preview, mistral-large-3. Several remaining entries here (deepseek-v3.1:671b, cogito-2.1:671b, kimi-k2-thinking) were NOT found in that live listing — they may have been superseded by the deepseek-v4-flash/pro and kimi-k2.x lines, but no confirmed rename mapping was found; needs a follow-up check before removing. The 'deepseek-v4-pro:cloud usage level 4 = paid-tier-only' framing below could not be corroborated — official docs describe usage levels 1-4 applying across all plans including free (heavier models simply consume quota faster), not a hard paid-only gate; treat that framing as a likely mischaracterization pending a direct docs.ollama.com/cloud recheck. OpenAI-compatible passthrough at https://ollama.com/v1. Uses OLLAMA_API_KEY. deepseek-v4-flash confirmed free. kimi-k2-thinking remains paid-only. deepseek-v3.1:671b remains recommended free reasoning-tier model pending the rename-mapping check above."
