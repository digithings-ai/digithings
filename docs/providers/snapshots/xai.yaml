  github_secret_key: null

notes: "MATERIAL CHANGE 2026-07-19: grok-4.5 launched 2026-07-08 (xAI's first release since the SpaceXAI/Cursor deal) — pitched by Musk as 'Opus-class', $2/$6 per 1M under 200K-token prompts, $4/$12 for prompts >=200K, 500K context, not yet available in the EU. Now the top-tier recommendation, above grok-4-3/grok-4-20. CORRECTION: grok-4-20's price was previously mis-recorded as $2/$6 (that figure actually belongs to grok-4.5) — corrected to its confirmed $1.25/$2.50. grok-3, already deprecated since the May 15 2026 slug retirement, now has a confirmed hard full-retirement date of 2026-08-15 — after that the slug stops resolving entirely rather than redirecting. A 'Grok Build 0.1' SKU (256K ctx, $1.00/$2.00 <200k, $2.00/$4.00 >=200k) was also spotted in current lineups, likely tied to an agentic/coding product — not added to this snapshot pending confirmation of its exact purpose. CRITICAL (unchanged) — grok-4-1-fast RETIRED May 15 2026 (all old slugs redirect to grok-4-3 at $1.25/$2.50 — a 6× price increase over grok-4-1-fast's old rate). No permanently-free model — xAI offers $25 signup credits + up to $150/mo via data-sharing opt-in (confirmed unchanged). Tool calls: X/Live/Web Search $5/1k successful calls, File Attachments $10/1k, Collections Search $2.50/1k. Key needed: XAI_API_KEY at console.x.ai. No probe run (method: skipped)."
