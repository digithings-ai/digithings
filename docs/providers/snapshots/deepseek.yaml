  batching:
    available: true
    discount_pct: 50
    max_batch_size: null
    turnaround_hours: 24
    notes: "Batch API available; 50% discount on asynchronous requests"
  prompt_caching:
    available: true
    min_cacheable_tokens: 1024
    ttl_seconds: null
    cost_per_1m_cached_writes: null
    cost_per_1m_cached_reads: 0.0028   # v4-flash; v4-pro is $0.003625
