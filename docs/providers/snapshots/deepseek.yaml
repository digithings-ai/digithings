notes: "V4 generation launched April 24, 2026. deepseek-v4-flash replaces deepseek-chat: 1M ctx, 384K out (input price possibly $0.14 cache-miss vs the $0.07 recorded here — official pricing page and this snapshot's methodology disagree on cache-hit vs cache-miss framing; verify before relying on the exact figure). deepseek-v4-pro replaces deepseek-reasoner: $0.435/$0.87 (permanent 75% cut), 1M ctx. PROBE 2026-07-19: deepseek-chat probe returned 402 Insufficient Balance — confirmed this is an account balance issue (standard pay-as-you-go zero-balance error per DeepSeek's own error-code docs), NOT evidence the alias itself is dead; deepseek-chat/deepseek-reasoner remain live and route to v4-flash/v4-pro until the hard cutover at 2026-07-24 15:59 UTC (5 days after this check) — recommend checking the probe account's grant expiry/balance and re-running before treating this as a deprecation signal. Free tier corrected: it is a one-time 5M-token grant (~$8.40 value) expiring 30 days after signup, not open-ended credits. Cache discount 96% on v4-flash. Data jurisdiction: platform hosted in China; use Fireworks/Together/DeepInfra for Western-jurisdiction hosting."
