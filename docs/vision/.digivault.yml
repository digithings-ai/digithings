# DigiVault manifest for the DigiThings architecture vision vault.
# Governs required frontmatter, the tag taxonomy, and link integrity.
# Validated in CI via `make vault-check`.
required_frontmatter:
  - title
  - type
  - status
allowed_tags:
  - moc
  - core
  - support
  - roadmap
  - orchestration
  - quant
  - retrieval
  - chat
  - auth
  - observability
  - audit
  - library
  - llm-routing
  - web-scraping
  - devtools
  - connectors
  - storage
  - knowledge-vault
  - dashboard
allow_orphans: false
