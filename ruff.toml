# Root ruff configuration — applies when `ruff check .` or `ruff format .`
# is invoked from the repo root. Per-component settings live in each
# component's pyproject.toml and override this file for that tree.

line-length = 100
target-version = "py312"

# Trees we don't want linted as part of the main stack.
#   apps/                       — downstream applications built on DigiThings.
#   digiquant/scripts/atlas/    — legacy operator scripts (pandas/yfinance), exempted
#                                 from the Polars-only policy. Migrated from
#                                 apps/digiquant-atlas/scripts/ in issue #316; not
#                                 actively maintained.
#   .venv/                      — virtualenvs
#   node_modules/               — JS deps
#   htmlcov/                    — coverage artifacts
#   docs/openapi/               — generated API specs
extend-exclude = [
  "apps",
  "digiquant/scripts/atlas",
  ".venv",
  ".venv-ci",
  "node_modules",
  "htmlcov",
  "docs/openapi",
]

# Per-file-ignores are intentional exceptions, documented inline.
[lint.per-file-ignores]
# Service entrypoints import after bootstrap (dotenv load, sys.path fixes).
# E402 flags "imports not at top of file" — here that's by design.
"**/server.py" = ["E402"]
# Package __init__ files re-export public symbols; ruff flags them as unused.
"**/__init__.py" = ["F401"]
# Parsers perform availability checks (`import pdfplumber` then `if not pdfplumber`).
"digisearch/src/digisearch/ingestion/parsers/*.py" = ["F401"]
# Tearsheet optionally uses plotly; guard is a try/import pattern ruff can't see through.
"digiquant/src/digiquant/tearsheet.py" = ["F401"]
