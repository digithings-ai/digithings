<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>DigiChat · digithings</title>
    <meta
      name="description"
      content="DigiChat is the Next.js app in digichat/ — this page links or redirects to your deployment."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../style.css" />
    <style>
      .dc-wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem;
        background: var(--bg-secondary, #0a0a0a);
      }
      .dc-panel {
        max-width: 32rem;
        width: 100%;
        padding: 2rem;
        border: 1px solid var(--border-color, #2a2a2a);
        border-radius: 12px;
        background: var(--bg-primary, #121212);
      }
      .dc-panel h1 {
        font-size: 1.5rem;
        margin-bottom: 0.75rem;
      }
      .dc-panel p {
        color: var(--text-secondary, #a3a3a3);
        margin-bottom: 1.25rem;
        font-size: 0.95rem;
      }
      .dc-actions {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .dc-actions a {
        display: inline-block;
        padding: 0.65rem 1rem;
        border-radius: 8px;
        text-align: center;
        text-decoration: none;
        font-weight: 500;
        border: 1px solid var(--border-color, #2a2a2a);
        color: var(--text-primary, #e6e6e6);
        transition: border-color 0.15s ease, background 0.15s ease;
      }
      .dc-actions a.primary {
        background: var(--text-primary, #e6e6e6);
        color: var(--bg-secondary, #0a0a0a);
        border-color: transparent;
      }
      .dc-actions a:hover {
        border-color: var(--text-secondary, #a3a3a3);
      }
      .dc-note {
        margin-top: 1.5rem;
        font-size: 0.8rem;
        color: var(--text-secondary, #a3a3a3);
        line-height: 1.5;
      }
      .dc-note code {
        font-size: 0.85em;
        padding: 0.1em 0.35em;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.06);
      }
    </style>
  </head>
  <body>
    <div class="dc-wrap">
      <div class="dc-panel">
        <h1>DigiChat</h1>
        <p>
          The chat UI lives in the <strong>Next.js</strong> app at repo root <code>digichat/</code> (not this folder).
          Run it locally or deploy it, then set <code>redirect.json</code> so this page sends visitors to your app.
        </p>
        <div class="dc-actions" id="actions">
          <a class="primary" id="btn-app" href="http://127.0.0.1:3000">Open local app (port 3000)</a>
          <a href="../">digithings home</a>
          <a
            href="https://github.com/digithings/digithings/blob/main/DIGICHAT.md"
            target="_blank"
            rel="noopener noreferrer"
            >DIGICHAT.md (setup)</a
          >
        </div>
        <p class="dc-note" id="redirect-note" hidden></p>
        <noscript>
          <p class="dc-note">Enable JavaScript for automatic redirect from <code>redirect.json</code>, or use the links above.</p>
        </noscript>
      </div>
    </div>
    <script>
      (async function () {
        var note = document.getElementById("redirect-note");
        var btn = document.getElementById("btn-app");
        var paths = ["redirect.local.json", "redirect.json"];
        try {
          for (var i = 0; i < paths.length; i++) {
            var res = await fetch(paths[i], { cache: "no-store" });
            if (!res.ok) continue;
            var data = await res.json();
            var url = typeof data.url === "string" ? data.url.trim() : "";
            if (!url) continue;
            new URL(url);
            btn.setAttribute("href", url);
            btn.textContent = "Open DigiChat";
            note.textContent = "Redirecting to your configured app…";
            note.hidden = false;
            window.location.replace(url);
            return;
          }
        } catch (e) {
          /* keep defaults */
        }
      })();
    </script>
  </body>
</html>
