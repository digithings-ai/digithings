# Digi Ecosystem – pytest config (root). Run: pytest (from repo root).
[pytest]
testpaths = tests digillm/tests digifetch/tests
pythonpath = . digibase/src digillm/src digifetch/src digikey/src digiquant/src digigraph/src digisearch/src digismith/src digiclaw/src
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short -ra
markers =
    unit: Unit tests (no network, no Docker).
    integration: Integration tests (HTTP to local or container).
    e2e: End-to-end tests (require stack: docker compose up or live servers).
    slow: Slow tests (e.g. full backtest).
    baseline: Always-green gate tests (imports, schemas, CLI help). No external deps.
    quarantine: Known-broken tests excluded from the baseline gate.
    deselected: Intentionally excluded from default ``pytest -m unit`` (integration-only or pending stack).

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
