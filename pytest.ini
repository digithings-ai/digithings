# Digi Ecosystem – pytest config (root). Run: pytest (from repo root).
[pytest]
testpaths = tests digisearch/test
pythonpath = . digiquant/src digigraph/src digisearch/src
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short -ra
markers =
    unit: Unit tests (no network, no Docker).
    integration: Integration tests (HTTP to local or container).
    e2e: End-to-end tests (require stack: docker compose up or live servers).
    slow: Slow tests (e.g. full backtest).

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
