[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "digiquant"
version = "0.1.0"
description = "DigiQuant – high-perf Nautilus + Polars quant pipeline (Digi Ecosystem)"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = [
    "pydantic>=2",
    "uvicorn[standard]>=0.30",
    "fastapi>=0.115",
    "polars>=1.0",
]
[project.optional-dependencies]
nautilus = ["nautilus_trader>=1.0", "requests>=2.28"]
all = ["digiquant[nautilus]"]
dev = ["pytest>=8", "pytest-cov>=4", "ruff>=0.8"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.pytest.ini_options]
testpaths = ["test"]
pythonpath = ["src"]
