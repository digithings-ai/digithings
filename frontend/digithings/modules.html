<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module — digithings</title>
    <meta name="description" content="DigiThings module reference.">
    <link rel="icon" type="image/svg+xml" href="assets/favicon-qr.svg" data-src-dark="assets/favicon-qr.svg" data-src-light="assets/favicon-qr-light.svg">
    <meta name="theme-color" content="#0B0C0E" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#FBFBF9" media="(prefers-color-scheme: light)">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../design/tokens.css">
    <link rel="stylesheet" href="../design/site/site.css">
    <link rel="stylesheet" href="style.css">
    <script>try{var s=localStorage.getItem('dt-theme');document.documentElement.setAttribute('data-theme',s||(matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'))}catch(e){}</script>
    <style>
      .crumb { font-family:var(--font-mono); font-size:.8rem; color:var(--ink-mute); margin-bottom:1.4rem; }
      .crumb a { color:var(--ink-soft); } .crumb a:hover { color:var(--accent); }
      .m-tier { font-family:var(--font-mono); font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); border:1px solid var(--accent-weak); background:var(--accent-weak); border-radius:999px; padding:.25rem .6rem; }
      .m-title { font-family:var(--font-display); font-weight:400; font-size:clamp(2.6rem,6vw,4.2rem); letter-spacing:-.02em; line-height:1.02; margin:1rem 0 .6rem; }
      .m-tag { font-size:1.15rem; color:var(--ink-soft); max-width:48ch; }
      .m-role { font-family:var(--font-mono); font-size:.82rem; color:var(--ink-mute); margin-top:.6rem; }
      .m-summary { max-width:62ch; margin-top:2.2rem; display:flex; flex-direction:column; gap:1rem; }
      .m-summary p { color:var(--ink-soft); font-size:1.05rem; }
      .m-api { margin-top:2.4rem; display:flex; flex-direction:column; gap:.8rem; max-width:62ch; }
      .m-api .lbl { font-family:var(--font-mono); font-size:.74rem; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-mute); margin-bottom:.3rem; }
      .m-actions { display:flex; gap:.75rem; flex-wrap:wrap; margin-top:2.4rem; }
      .m-related { margin-top:3rem; padding-top:1.8rem; border-top:1px solid var(--hair); }
      .m-related h3 { font-family:var(--font-mono); font-size:.74rem; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-mute); margin-bottom:1rem; }
      .chips { display:flex; gap:.6rem; flex-wrap:wrap; }
      .chip { display:inline-flex; align-items:center; gap:.4rem; border:1px solid var(--hair); background:var(--surface); border-radius:999px; padding:.5rem .9rem; font-family:var(--font-mono); font-size:.84rem; color:var(--ink-soft); transition:.18s var(--ease); }
      .chip:hover { color:var(--ink); border-color:var(--hair-2); transform:translateY(-1px); }
      .chip::before { content:""; width:7px; height:7px; border-radius:50%; background:var(--accent); }
    </style>
</head>
<body>
    <div class="grain" aria-hidden="true"></div>
    <div class="glow" aria-hidden="true"></div>

    <header class="site-nav" id="nav">
        <div class="wrap nav-inner">
            <a class="brand" href="index.html" aria-label="digithings home">
                <img src="assets/favicon-qr.svg" alt="" class="brand-mark" aria-hidden="true" data-src-dark="assets/favicon-qr.svg" data-src-light="assets/favicon-qr-light.svg">
                <span class="brand-word">digithings</span>
            </a>
            <nav class="nav-links" id="nav-links" aria-label="Primary">
                <a href="architecture.html">Architecture</a>
                <a href="index.html#modules" class="is-current">Modules</a>
                <a href="index.html#principles">Principles</a>
                <a href="https://digiquant.io" target="_blank" rel="noopener noreferrer">digiquant.io <span class="ext" aria-hidden="true">↗</span></a>
                <a href="https://github.com/digithings-ai" target="_blank" rel="noopener noreferrer">GitHub <span class="ext" aria-hidden="true">↗</span></a>
                <a class="btn btn-sm" href="chat.html">Try Chat</a>
            </nav>
            <div class="nav-tail">
                <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle colour theme" title="Toggle theme">
                    <svg class="ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M19.1 4.9l-1.8 1.8M6.7 17.3l-1.8 1.8"/></svg>
                    <svg class="ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/></svg>
                </button>
                <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-links"><span></span><span></span></button>
            </div>
        </div>
    </header>

    <main class="section">
        <div class="wrap" id="mod-root"><!-- rendered from modules.json --></div>
    </main>

    <footer class="footer">
        <div class="wrap footer-inner">
            <a class="brand" href="index.html" aria-label="digithings home"><img src="assets/favicon-qr.svg" alt="" class="brand-mark" aria-hidden="true" data-src-dark="assets/favicon-qr.svg" data-src-light="assets/favicon-qr-light.svg"><span class="brand-word">digithings</span></a>
            <nav class="footer-links" aria-label="Footer"><a href="architecture.html">Architecture</a><a href="https://github.com/digithings-ai" target="_blank" rel="noopener noreferrer">GitHub</a><a href="https://digiquant.io" target="_blank" rel="noopener noreferrer">digiquant.io</a></nav>
            <p class="footer-meta">© 2026 DigiThings · open core</p>
        </div>
    </footer>

    <script type="module">
      import { initTheme } from "../design/site/theme.js";
      import { initNav } from "../design/site/ui.js";
      initTheme(); initNav();

      const root = document.getElementById("mod-root");
      const id = new URLSearchParams(location.search).get("mod");
      const el = (tag, cls, txt) => { const e = document.createElement(tag); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; };

      function notFound(msg) {
        root.append(el("p", "crumb", "module not found"));
        const h = el("h1", "m-title", "Unknown module");
        const p = el("p", "m-tag", msg || "That module id isn't in the registry.");
        const a = el("a", "btn btn-primary"); a.href = "architecture.html"; a.textContent = "Browse the architecture →";
        const actions = el("div", "m-actions"); actions.append(a);
        root.append(h, p, actions);
      }

      fetch("modules.json").then((r) => r.json()).then((data) => {
        const mods = data.modules;
        const m = mods.find((x) => x.id === id);
        if (!m) return notFound("Try one of: " + mods.map((x) => x.id).join(", ") + ".");
        document.title = m.name + " — digithings";

        const crumb = el("p", "crumb");
        const ca = el("a", null, "architecture"); ca.href = "architecture.html";
        crumb.append(ca, document.createTextNode(" / " + m.id));

        const tier = el("span", "m-tier", m.tier === "core" ? "core vertical" : "support module");
        const title = el("h1", "m-title", m.name);
        const tag = el("p", "m-tag", m.tagline || "");
        const role = el("p", "m-role", m.role + (m.port ? "  ·  :" + m.port : ""));

        const summary = el("div", "m-summary");
        (m.summary || []).forEach((para) => summary.append(el("p", null, para)));

        const api = el("div", "m-api");
        (m.api || []).forEach((a) => {
          const block = document.createElement("div");
          if (a.label) block.append(el("div", "lbl", a.label));
          block.append(el("code", "snippet", a.code));
          api.append(block);
        });

        const actions = el("div", "m-actions");
        (m.links || []).forEach((lnk, i) => {
          const a = el("a", i === 0 ? "btn btn-primary" : "btn btn-ghost", lnk.label);
          a.href = lnk.href;
          if (/^https?:/.test(lnk.href)) { a.target = "_blank"; a.rel = "noopener noreferrer"; }
          actions.append(a);
        });

        root.append(crumb, tier, title, tag, role, summary);
        if ((m.api || []).length) root.append(api);
        if ((m.links || []).length) root.append(actions);

        if ((m.related || []).length) {
          const rel = el("div", "m-related");
          rel.append(el("h3", null, "related modules"));
          const chips = el("div", "chips");
          m.related.forEach((rid) => {
            const rm = mods.find((x) => x.id === rid);
            const a = el("a", "chip", rm ? rm.name : rid);
            a.href = "modules.html?mod=" + rid;
            chips.append(a);
          });
          rel.append(chips);
          root.append(rel);
        }
      }).catch(() => notFound("Could not load the module registry."));
    </script>
</body>
</html>
