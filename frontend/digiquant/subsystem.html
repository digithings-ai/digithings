    <link rel="alternate icon" href="../design/assets/favicon.ico">
    <meta name="theme-color" content="#0B0C0E" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#FBFBF9" media="(prefers-color-scheme: light)">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <script>try{var s=localStorage.getItem('dt-theme');document.documentElement.setAttribute('data-theme',s||(matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'))}catch(e){}</script>
    <style>
      .crumb { font-family:var(--font-mono); font-size:.8rem; color:var(--ink-mute); margin-bottom:1.4rem; }
      .crumb a { color:var(--ink-soft); } .crumb a:hover { color:var(--accent); }
      .m-tier { font-family:var(--font-mono); font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); border:1px solid var(--accent-weak); background:var(--accent-weak); border-radius:999px; padding:.25rem .6rem; }
      .m-title { font-family:var(--font-sans); font-weight:600; font-size:clamp(2.4rem,6vw,3.8rem); letter-spacing:-.03em; line-height:1.04; margin:1rem 0 .6rem; }
      .m-tag { font-size:1.15rem; color:var(--ink-soft); max-width:48ch; }
      .m-role { font-family:var(--font-mono); font-size:.82rem; color:var(--ink-mute); margin-top:.6rem; }
      .m-summary { max-width:62ch; margin-top:2.2rem; display:flex; flex-direction:column; gap:1rem; }
      .m-summary p { color:var(--ink-soft); font-size:1.05rem; }
      .m-api { margin-top:2.4rem; max-width:62ch; }
      .m-actions { display:flex; gap:.75rem; flex-wrap:wrap; margin-top:2.4rem; }
      .m-related { margin-top:3rem; padding-top:1.8rem; border-top:1px solid var(--hair); }
      .m-related h3 { font-family:var(--font-mono); font-size:.74rem; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-mute); margin-bottom:1rem; }
      .chips { display:flex; gap:.6rem; flex-wrap:wrap; }
      .chip { display:inline-flex; align-items:center; gap:.4rem; border:1px solid var(--hair); background:var(--surface); border-radius:999px; padding:.5rem .9rem; font-family:var(--font-mono); font-size:.84rem; color:var(--ink-soft); transition:.18s var(--ease); }
      .chip:hover { color:var(--ink); border-color:var(--hair-2); transform:translateY(-1px); }
      .chip::before { content:""; width:7px; height:7px; border-radius:50%; background:var(--accent); }
    </style>
</head>
<body class="dq">
    <div class="grain" aria-hidden="true"></div>
    <div class="glow" aria-hidden="true"></div>

    <header class="site-nav" id="nav">
        <div class="wrap nav-inner">
            <a class="brand" href="index.html" aria-label="digiquant home"><span class="dq-glyph" aria-hidden="true"></span><span class="brand-word">digiquant</span></a>
            <nav class="nav-links" id="nav-links" aria-label="Primary">
                <a href="pipeline.html">Pipeline</a>
                <a href="subsystem.html?id=atlas" class="is-current">Atlas</a>
                <a href="strategies.html">Strategies</a>
                <a href="index.html#pricing">Pricing</a>
                <a href="https://digithings.ai" target="_blank" rel="noopener noreferrer">digithings.ai <span class="ext" aria-hidden="true">↗</span></a>
                <a href="https://github.com/digithings-ai" target="_blank" rel="noopener noreferrer">GitHub <span class="ext" aria-hidden="true">↗</span></a>
                <a class="btn btn-sm" href="./olympus/">Open Olympus</a>
            </nav>
            <div class="nav-tail">
                <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle colour theme" title="Toggle theme">
                    <svg class="ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M19.1 4.9l-1.8 1.8M6.7 17.3l-1.8 1.8"/></svg>
                    <svg class="ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/></svg>
                </button>
                <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-links"><span></span><span></span></button>
            </div>
        </div>
    </header>

    <main class="section">
        <div class="wrap" id="sub-root"></div>
    </main>

    <footer class="footer">
        <div class="wrap footer-inner">
            <a class="brand" href="index.html" aria-label="digiquant home"><span class="dq-glyph" aria-hidden="true"></span><span class="brand-word">digiquant</span></a>
            <nav class="footer-links" aria-label="Footer"><a href="pipeline.html">Pipeline</a><a href="./olympus/">Olympus</a><a href="https://github.com/digithings-ai" target="_blank" rel="noopener noreferrer">GitHub</a></nav>
            <p class="footer-meta">© 2026 digithings AI · open core</p>
        </div>
    </footer>

    <script type="module">
      import { initTheme } from "../design/site/theme.js";
      import { initNav } from "../design/site/ui.js";
      initTheme(); initNav();
      const root = document.getElementById("sub-root");
      const id = new URLSearchParams(location.search).get("id");
      const el = (tag, cls, txt) => { const e = document.createElement(tag); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; };
      function notFound(msg) {
        root.append(el("p","crumb","subsystem not found"));
        root.append(el("h1","m-title","Unknown subsystem"));
        root.append(el("p","m-tag", msg||""));
        const a=el("a","btn btn-primary"); a.href="pipeline.html"; a.textContent="Open the pipeline →";
        const ac=el("div","m-actions"); ac.append(a); root.append(ac);
      }
      fetch("subsystems.json").then((r)=>r.json()).then((data)=>{
        const subs=data.subsystems; const m=subs.find((x)=>x.id===id);
        if(!m) return notFound("Try one of: " + subs.map((x)=>x.id).join(", ") + ".");
        document.title = m.name + " — DigiQuant";
        const crumb=el("p","crumb"); const ca=el("a",null,"pipeline"); ca.href="pipeline.html"; crumb.append(ca, document.createTextNode(" / "+m.id));
        root.append(crumb, el("span","m-tier", m.tier), el("h1","m-title", m.name), el("p","m-tag", m.tagline||""), el("p","m-role", m.role));
        const sum=el("div","m-summary"); (m.summary||[]).forEach((p)=>sum.append(el("p",null,p))); root.append(sum);
        if((m.api||[]).length){ const api=el("div","m-api"); (m.api||[]).forEach((a)=>{ const b=document.createElement("div"); b.append(el("code","snippet",a.code)); api.append(b); }); root.append(api); }
        if((m.links||[]).length){ const ac=el("div","m-actions"); m.links.forEach((lnk,i)=>{ const a=el("a", i===0?"btn btn-primary":"btn btn-ghost", lnk.label); a.href=lnk.href; if(/^https?:/.test(lnk.href)){a.target="_blank";a.rel="noopener noreferrer";} ac.append(a); }); root.append(ac); }
        if((m.related||[]).length){ const rel=el("div","m-related"); rel.append(el("h3",null,"related subsystems")); const chips=el("div","chips"); m.related.forEach((rid)=>{ const rm=subs.find((x)=>x.id===rid); const a=el("a","chip", rm?rm.name:rid); a.href="subsystem.html?id="+rid; chips.append(a); }); rel.append(chips); root.append(rel); }
      }).catch(()=>notFound("Could not load the subsystem registry."));
    </script>
</body>
</html>
