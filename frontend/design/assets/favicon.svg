<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- DigiThings favicon: simplified dot-matrix mark derived from qrw.svg.
       A 5x5 grid of dots on a dark square, reminiscent of the full logo. -->
  <rect width="32" height="32" rx="4" fill="#0a0a0a"/>
  <g fill="#ffffff">
    <!-- Row 1 -->
    <circle cx="6"  cy="6"  r="1.6"/>
    <circle cx="12" cy="6"  r="1.6"/>
    <circle cx="20" cy="6"  r="1.6"/>
    <circle cx="26" cy="6"  r="1.6"/>
    <!-- Row 2 -->
    <circle cx="6"  cy="12" r="1.6"/>
    <circle cx="16" cy="12" r="1.6"/>
    <circle cx="26" cy="12" r="1.6"/>
    <!-- Row 3 -->
    <circle cx="12" cy="16" r="1.6"/>
    <circle cx="16" cy="16" r="1.6"/>
    <circle cx="20" cy="16" r="1.6"/>
    <!-- Row 4 -->
    <circle cx="6"  cy="20" r="1.6"/>
    <circle cx="16" cy="20" r="1.6"/>
    <circle cx="26" cy="20" r="1.6"/>
    <!-- Row 5 -->
    <circle cx="6"  cy="26" r="1.6"/>
    <circle cx="12" cy="26" r="1.6"/>
    <circle cx="20" cy="26" r="1.6"/>
    <circle cx="26" cy="26" r="1.6"/>
  </g>
</svg>
