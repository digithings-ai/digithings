name: Route issues to projects

# Route issues to the correct GitHub Project board(s) based on component label.
# Requires a PAT with `project` + `repo` scopes stored as {{PROJECT_TOKEN_SECRET}}.
# If the secret is not set, this workflow skips silently with a warning.

on:
  issues:
    types: [opened, reopened, transferred, labeled]

permissions:
  contents: read

jobs:
  route:
    name: Add issue to the correct project board(s)
    runs-on: ubuntu-latest
    steps:
      - name: Check token present
        id: token
        env:
          TOKEN: ${{ secrets.{{PROJECT_TOKEN_SECRET}} }}
        run: |
          if [[ -n "${TOKEN:-}" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Secret {{PROJECT_TOKEN_SECRET}} not set — skipping project routing. Create a PAT with 'project' + 'repo' scopes and store it as {{PROJECT_TOKEN_SECRET}}."
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute target projects from labels
        id: targets
        if: steps.token.outputs.present == 'true'
        env:
          LABELS: ${{ toJson(github.event.issue.labels) }}
        run: |
          # Read project routing from agents.yml if available, else use defaults.
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import json, os

          labels = {l["name"] for l in json.loads(os.environ["LABELS"])}

          # Try to load component→project mapping from agents.yml.
          component_to_project = {}
          default_project = 1
          try:
              import yaml
              with open("agents.yml") as f:
                  cfg = yaml.safe_load(f)
              projects = cfg.get("github_projects", {})
              default_project = projects.get("default_project", 1)
              comp_map = projects.get("component_map", {})
              if isinstance(comp_map, dict):
                  component_to_project = {f"component:{k}": v for k, v in comp_map.items()}
          except Exception:
              pass

          targets = set()
          is_epic = "epic" in labels
          module_proj = next((p for lab, p in component_to_project.items() if lab in labels), None)

          if is_epic:
              targets.add(default_project)
              if module_proj:
                  targets.add(module_proj)
          elif module_proj:
              targets.add(module_proj)
          else:
              targets.add(default_project)

          print(f"projects={','.join(str(t) for t in sorted(targets))}")
          PY

      - name: Add to each target project
        if: steps.token.outputs.present == 'true' && steps.targets.outputs.projects != ''
        env:
          GH_TOKEN: ${{ secrets.{{PROJECT_TOKEN_SECRET}} }}
          TARGETS:  ${{ steps.targets.outputs.projects }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ORG_NAME: "{{ORG_NAME}}"
        run: |
          set -euo pipefail
          IFS=',' read -ra PROJ_NUMS <<< "$TARGETS"
          for num in "${PROJ_NUMS[@]}"; do
            echo "Adding ${ISSUE_URL} to Project #${num}..."
            gh project item-add "$num" --owner "$ORG_NAME" --url "$ISSUE_URL" || {
              echo "::warning::Failed to add to Project #${num} (may already exist or token lacks scope)"
            }
          done
