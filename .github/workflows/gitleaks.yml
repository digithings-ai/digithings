# Secrets-scan CI (epic #2 hardening sub-task).
#
# Scans PR diffs on every pull request and the full history on pushes to
# develop/main. Fails the job on any finding. The repo's ".gitleaks.toml"
# extends the default ruleset and allowlists known test fixtures.
name: gitleaks

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

env:
  # Pinned gitleaks OSS CLI release. Bump together with a SECURITY.md note.
  # (gitleaks/gitleaks-action v2 now requires a paid license for org repos
  # per their Aug-2022 announcement, so we invoke the OSS CLI directly —
  # still MIT-licensed and identical scanner.)
  GITLEAKS_VERSION: "8.21.2"
  # Checksum of the gitleaks_<version>_linux_x64.tar.gz release asset. Pin
  # for supply-chain integrity; update when bumping GITLEAKS_VERSION.
  GITLEAKS_SHA256: "5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba"

jobs:
  scan:
    name: gitleaks-scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can resolve the PR base..head diff on
          # pull_request and scan the full log on develop/main pushes.
          fetch-depth: 0

      - name: Install gitleaks (pinned release tarball)
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL -o /tmp/gitleaks.tgz "$url"
          # Checksum verification guards against tampered release assets.
          # If this step fails after a version bump, recompute SHA256 and
          # update GITLEAKS_SHA256.
          actual="$(sha256sum /tmp/gitleaks.tgz | awk '{print $1}')"
          if [ "$actual" != "$GITLEAKS_SHA256" ]; then
            echo "checksum mismatch: expected $GITLEAKS_SHA256 got $actual" >&2
            exit 1
          fi
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install -m 755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan (PR diff)
        if: github.event_name == 'pull_request'
        run: |
          # Fast path: scan only commits in the PR range. Uses git log -p.
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            --log-opts="--no-merges origin/${GITHUB_BASE_REF}..HEAD"

      - name: Scan (full history)
        if: github.event_name == 'push'
        run: |
          # develop/main: scan the full repo history to catch leaks pushed
          # around checks (belt-and-braces with the PR-gate above).
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --no-banner
