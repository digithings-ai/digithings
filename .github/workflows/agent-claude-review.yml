name: "Agent: Claude review"

# Secondary PR reviewer (Tier 3 fallback). Primary PR review is handled by
# Copilot — see .github/workflows/ci.yml request-copilot-review job.
#
# Feature-flagged OFF by default. Opt-in via repo variable:
#   Settings → Secrets and variables → Actions → Variables
#   ENABLE_CLAUDE_PR_REVIEW = true
#
# Also requires CLAUDE_CODE_OAUTH_TOKEN secret. If either is absent, the
# workflow exits silently.
#
# Security: author_association filter keeps external contributors from
# burning subscription compute.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Skip doc-only / issue-template / workflow-only PRs — Claude's /code-review
    # rarely adds value there, and it cuts subscription-token burn on agent PRs
    # that push frequently.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      # Presentation-only surfaces — /code-review rarely adds value on CSS /
      # shared design system, and design iteration pushes frequently (#1310).
      - 'frontend/design/**'
      - '**.css'

concurrency:
  # Cancel in-flight review when the PR is updated — avoids stacking reviews
  # on rapid-fire pushes (common with agent PRs).
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: read
  id-token: write

jobs:
  review:
    name: Claude /code-review
    if: |
      vars.ENABLE_CLAUDE_PR_REVIEW == 'true' &&
      github.event.pull_request.draft == false &&
      github.actor != 'dependabot[bot]' &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check token present
        id: keycheck
        env:
          KEY: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "${KEY:-}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN not set — auto-review disabled."
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude /code-review
        if: steps.keycheck.outputs.present == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # Pin to Sonnet: review is pattern-matching + style, not judgment-heavy.
          # Opus here burns subscription tokens 5× faster on work Sonnet handles.
          claude_args: '--model claude-sonnet-4-6'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
