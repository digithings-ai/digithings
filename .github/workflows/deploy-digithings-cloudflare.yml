# Document and gate the digithings.ai Cloudflare Pages build.
# Primary deploy is Cloudflare Pages watching `main` + scripts/build-digithings.sh
# (now a Next.js static-export Node build). This workflow validates the build
# script on PRs touching digithings.ai assets.
name: digithings.ai Cloudflare build check

on:
  pull_request:
    paths:
      - "frontend/digithings-web/**"
      - "frontend/web/**"
      - "frontend/design/**"
      - "scripts/build-digithings.sh"
      - ".github/workflows/deploy-digithings-cloudflare.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-dist:
    name: bash scripts/build-digithings.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Assemble dist/ (same as Cloudflare Pages)
        run: bash scripts/build-digithings.sh

      - name: Assert dist layout
        run: |
          test -f dist/index.html
          test -f dist/CNAME
          test -f dist/modules/digigraph/index.html
          test -f dist/architecture/index.html
          grep -q digithings.ai dist/CNAME
          # fonts self-hosted; no Google Fonts references in the export
          ! grep -rq "fonts.googleapis.com" dist
