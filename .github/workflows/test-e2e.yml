# E2e contract tests gate PRs via ci.yml workflow_call.
# Full compose stack job is develop push / workflow_dispatch only (non-blocking).
# Requires Docker Compose + E2E_BEARER_TOKEN secret for protected routes.
name: "Test: e2e stack"

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [develop]
    paths:
      - "tests/test_e2e.py"
      - "tests/test_e2e_contract.py"
      - "docker-compose.yml"
      - ".github/workflows/test-e2e.yml"

permissions:
  contents: read

jobs:
  e2e-contract:
    name: e2e contract (no stack)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest cryptography -e "./digikey[dev]"
      - run: python -m pytest tests/test_e2e_contract.py -m unit -v --tb=short

  e2e:
    name: pytest -m e2e (compose stack)
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Non-blocking on develop: stack + secrets are operator-owned.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: |
          python -m pip install -U pip
          pip install -e "./digibase[dev]" -e "./digikey[dev]" httpx pytest

      - name: Start stack
        run: |
          cp .env.example .env
          docker compose up -d --wait digigraph digiquant digisearch digikey

      - name: Run e2e tests
        env:
          E2E_BEARER_TOKEN: ${{ secrets.E2E_BEARER_TOKEN }}
        run: |
          python -m pytest tests/test_e2e.py -m e2e -v --tb=short

      - name: Tear down
        if: always()
        run: docker compose down -v
