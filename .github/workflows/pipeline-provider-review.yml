# .github/workflows/pipeline-provider-review.yml
name: "Pipeline: provider review"

# Weekly automated LLM provider review.
# Step 1: Probe all providers with live API calls.
# Step 2: Assemble context package (snapshots + pricing + decision comments).
# Step 3: Claude agent researches, updates snapshots, evaluates decisions, writes findings.
# Step 4: Open GitHub issues for each novel trigger condition found.
#
# Feature-flagged on CLAUDE_CODE_OAUTH_TOKEN. Silent-exit when absent.
# Budget: 1 Claude invocation/week.

on:
  schedule:
    - cron: '0 0 * * 0'   # Every Sunday 00:00 UTC
  workflow_dispatch:        # Manual trigger anytime

permissions:
  contents: read

jobs:
  unit-tests:
    name: Provider review unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test deps
        run: pip install pyyaml openai httpx pytest

      - name: Pytest
        run: python -m pytest tests/provider_review/ -m unit -v --tb=short

  review:
    needs: unit-tests
    permissions:
      contents: write           # agent commits snapshot updates on a bot/ branch
      issues: write
      pull-requests: write      # Step 3b opens a PR for the pushed bot/ branch
    name: Weekly provider review
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git for agent commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check Claude auth present
        id: keycheck
        env:
          KEY: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "${KEY:-}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN not set — provider review disabled."
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.keycheck.outputs.present == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.keycheck.outputs.present == 'true'
        run: pip install openai httpx pyyaml

      # ── Step 1: Probe ───────────────────────────────────────────────────────
      - name: Step 1 — Probe providers
        if: steps.keycheck.outputs.present == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/review
          python scripts/provider_review/probe.py

      # ── Step 2: Bootstrap ───────────────────────────────────────────────────
      - name: Step 2 — Bootstrap context
        if: steps.keycheck.outputs.present == 'true'
        run: python3 scripts/provider_review/bootstrap.py

      - name: Set review date
        if: steps.keycheck.outputs.present == 'true'
        run: echo "REVIEW_TODAY=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      # ── Step 3: Claude agent (claude-code-action — no bare `claude` CLI on runners) ──
      - name: Step 3 — Claude agent research and evaluation
        if: steps.keycheck.outputs.present == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Agent mode (auto-detected for schedule/workflow_dispatch) grants no default tool
          # permissions or permission-mode, unlike tag mode's @claude flow — see issue #1241.
          # This repo's own .claude/settings.json only pre-approves a handful of Bash commands,
          # so STEP A-F's WebSearch/Write/Edit/git calls need an explicit grant here or every
          # one of them is silently denied in headless CI with no human to approve.
          claude_args: >-
            --max-turns 40
            --allowedTools "WebSearch,Write,Edit,Bash(python scripts/provider_review/generate_docs.py:*),Bash(git checkout:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*)"
          prompt: |
            You are performing the weekly LLM provider review for the DigiThings project.

            Your context package is in /tmp/review/:
            - snapshots.json: current provider snapshots (update these)
            - probe-results.json: live probe results from this run
            - litellm-pricing.json: upstream LiteLLM pricing data
            - decisions.json: all # llm-decision: tagged config entries (file + line + tags + model)
            - manifest.json: summary counts

            Execute these steps in order:

            STEP A — RESEARCH: For each provider in snapshots.json, use web search to verify
            the current free-tier quota limits, model availability, and pricing. Cross-reference
            against probe-results.json and litellm-pricing.json.

            STEP B — UPDATE SNAPSHOTS: Write updated YAML to docs/providers/snapshots/*.yaml.
            For each model in each snapshot:
            - Set verified=true/false from probe-results.json (match on provider name)
            - Set last_verified=${{ env.REVIEW_TODAY }} and last_verified_latency_ms from probe results
            - Set verification_error from probe results error field (null if ok/skipped)
            - Update status to paid-only if probe returned auth error (401/403)
            - Update quota numbers from your research findings

            STEP C — REGENERATE CATALOG: Rewrite docs/LLM_PROVIDERS.md so the free-tier
            quota numbers for each provider match the updated snapshots. Preserve the
            existing document structure and prose style exactly.

            STEP D — EVALUATE DECISIONS: For each entry in decisions.json, assess:
            1. Is the current model still verified-active in the updated snapshot?
            2. Has a materially better free option emerged for this decision role
               (extraction/research/reasoning)?
            3. Is the cost delta for a paid upgrade now justified vs current free option?
            Produce a one-line cost-benefit score per entry.

            STEP E — WRITE FINDINGS: Write /tmp/review/findings.json as a JSON array.
            Each object must have these exact keys:
            {
              "provider": "<provider_name>",
              "trigger": "<quota_drop|model_deprecated|better_free|cost_increase>",
              "summary": "<one-line description under 80 chars>",
              "detail": "<full explanation>",
              "config_file": "<file:line or N/A>",
              "tags": ["<tag1>", "<tag2>"],
              "current_model": "<model_id or N/A>",
              "cost_benefit_table": "| Option | Score | Cost/run | Notes |\n|---|---|---|---|\n...",
              "recommendation": "<one-line recommendation>"
            }
            Write [] if no trigger conditions are found this week.

            STEP F — REGENERATE, COMMIT, AND PUSH:
            Run `python scripts/provider_review/generate_docs.py` to refresh docs/free-providers/*
            from the updated snapshots (exit code 1 means files were updated — that is expected).
            Then, on a NEW branch — `develop` is protected and direct commits to it can never be
            pushed, so never `git commit` on the ref you checked out:
            git checkout -b bot/provider-review-${{ env.REVIEW_TODAY }}
            git add docs/providers/snapshots/ docs/free-providers/ docs/LLM_PROVIDERS.md
            Commit with message:
            'docs(providers): weekly snapshot update ${{ env.REVIEW_TODAY }}'
            git push -u origin bot/provider-review-${{ env.REVIEW_TODAY }}

            If generate_docs.py made no changes (nothing to add), skip the checkout/commit/push
            entirely — the next workflow step checks whether the branch exists and no-ops if it
            doesn't.

            Do NOT create GitHub issues — Step 4 handles that.
            Do NOT open a pull request yourself — the next workflow step handles that.
            Do NOT modify any files outside docs/providers/, docs/free-providers/, and docs/LLM_PROVIDERS.md.

      # ── Step 3b: open a PR for the pushed snapshot-update branch (trusted script, ─
      # not the sandboxed agent — the agent only ever pushes a branch, never touches develop) ──
      - name: Step 3b — Open PR for snapshot updates
        if: steps.keycheck.outputs.present == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          BRANCH="bot/provider-review-${REVIEW_TODAY}"
          if ! git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            echo "::notice::No branch $BRANCH pushed by Step 3 — nothing to open a PR for this week."
            exit 0
          fi
          EXISTING=$(gh pr list --repo "$REPO" --head "$BRANCH" --state open \
            --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "::notice::PR #$EXISTING already open for $BRANCH — skipping."
            exit 0
          fi
          gh pr create --repo "$REPO" \
            --base develop \
            --head "$BRANCH" \
            --title "docs(providers): weekly snapshot update ${REVIEW_TODAY}" \
            --label "housekeeping,automerge-docs" \
            --body "Automated weekly refresh of provider snapshots, generated by Step 3 (Claude agent) of the [Weekly provider review](../actions/workflows/pipeline-provider-review.yml) job.

          - Updated \`docs/providers/snapshots/*.yaml\` verification status and quota numbers
          - Regenerated \`docs/free-providers/*\` and \`docs/LLM_PROVIDERS.md\`

          Labeled \`automerge-docs\`; [agent-docs-automerge.yml](../actions/workflows/agent-docs-automerge.yml) verifies the diff is doc-only before enabling auto-merge."

      # ── Step 4: Issue creation ──────────────────────────────────────────────
      - name: Step 4 — Create issues for findings
        if: steps.keycheck.outputs.present == 'true'
        env:
          GH_TOKEN: ${{ secrets.DIGITHINGS_PROJECT_TOKEN }}
          REPO: ${{ github.repository }}
        run: python3 scripts/provider_review/create_issues.py
