name: Auto-assign Copilot on exec:copilot label

# Bridges the exec:copilot tier label to an actual @Copilot assignment.
# Without this, exec:copilot is documentation-only — issues sit silently
# until a human manually assigns @Copilot.
#
# Flow:
#   exec:copilot label applied
#     → check quota-state issue #387 for quota:copilot-exhausted
#     → if quota fetch fails: skip assignment with warning (fail closed)
#     → if ok: assign @Copilot (SWE coding agent picks it up)
#     → if exhausted + priority:high|critical: swap to exec:claude (local Tier 3)
#     → if exhausted + lower priority: add pending:quota, park until reset

on:
  issues:
    # labeled — label added to an existing issue
    # opened/reopened — labels set at gh issue create time do NOT fire labeled
    types: [labeled, opened, reopened]

permissions:
  contents: read
  issues: write

env:
  QUOTA_STATE_ISSUE: "387"

jobs:
  assign:
    name: Assign @Copilot
    runs-on: ubuntu-latest
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'exec:copilot') ||
      ((github.event.action == 'opened' || github.event.action == 'reopened') &&
       contains(github.event.issue.labels.*.name, 'exec:copilot'))

    steps:
      - name: Check quota state
        id: quota
        env:
          GH_TOKEN:     ${{ github.token }}
          REPO:         ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels) }}
        run: |
          # Fail closed: if we can't read quota state, skip assignment with a warning
          # rather than blindly assigning when quota may be exhausted.
          if ! STATE_LABELS=$(gh issue view "$QUOTA_STATE_ISSUE" \
              --repo "$REPO" --json labels \
              --jq '[.labels[].name]' 2>&1); then
            echo "::warning::Could not read quota-state issue #${QUOTA_STATE_ISSUE} — skipping @Copilot assignment to avoid overrun. Error: ${STATE_LABELS}"
            echo "exhausted=unknown" >> "$GITHUB_OUTPUT"
            echo "priority=none"     >> "$GITHUB_OUTPUT"
            exit 0
          fi

          EXHAUSTED=$(echo "$STATE_LABELS" | python3 -c "
          import json, sys
          labels = json.load(sys.stdin)
          print('true' if 'quota:copilot-exhausted' in labels else 'false')
          ")

          PRIORITY=$(echo "$ISSUE_LABELS" | python3 -c "
          import json, sys, re
          labels = json.load(sys.stdin)
          tier = 'none'
          for l in labels:
              m = re.match(r'^priority:(critical|high|medium|low)$', l['name'])
              if m:
                  tier = m.group(1)
                  break
          print(tier)
          ")

          echo "exhausted=$EXHAUSTED"   >> "$GITHUB_OUTPUT"
          echo "priority=$PRIORITY"     >> "$GITHUB_OUTPUT"

      # ── Happy path: assign Copilot coding agent (GraphQL) ───────────────────
      - uses: actions/checkout@v4
        if: steps.quota.outputs.exhausted == 'false'

      - name: Assign Copilot coding agent to issue
        if: steps.quota.outputs.exhausted == 'false'
        env:
          # PAT required: github.token cannot assign bot users and fails with
          # "Bot does not have access to the repository (replaceActorsForAssignable)".
          # DIGITHINGS_PROJECT_TOKEN has repo+project scopes; fallback keeps forks working.
          GH_TOKEN:        ${{ secrets.DIGITHINGS_PROJECT_TOKEN || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER:    ${{ github.event.issue.number }}
          COPILOT_BASE_REF: develop
        run: |
          set -euo pipefail
          if python3 scripts/assign_copilot_agent.py "$ISSUE_NUMBER" --check-only; then
            echo "Copilot already assigned to issue #$ISSUE_NUMBER — skipping."
            exit 0
          fi
          python3 scripts/assign_copilot_agent.py "$ISSUE_NUMBER" || \
            echo "::warning::Could not assign Copilot — ensure Copilot coding agent is enabled (Settings → Copilot → Coding agent) and DIGITHINGS_PROJECT_TOKEN secret is set."

      # ── Quota exhausted: escalate high/critical ──────────────────────────────
      - name: Escalate to Tier 3 (priority high|critical, quota exhausted)
        if: |
          steps.quota.outputs.exhausted == 'true' &&
          (steps.quota.outputs.priority == 'high' || steps.quota.outputs.priority == 'critical')
        env:
          GH_TOKEN:           ${{ github.token }}
          REPO:               ${{ github.repository }}
          ISSUE_NUMBER:       ${{ github.event.issue.number }}
          PRIORITY:           ${{ steps.quota.outputs.priority }}
          QUOTA_STATE_ISSUE:  ${{ env.QUOTA_STATE_ISSUE }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" \
            --remove-label "exec:copilot" --add-label "exec:claude"

          printf '**Copilot quota exhausted — escalating to Tier 3 (Claude Code, local)**\n\nPriority: `%s`. Run locally:\n\n```\nmake task ISSUE=%s\n```\n\nState: [quota state issue #%s](../../issues/%s)\n' \
            "$PRIORITY" "$ISSUE_NUMBER" "$QUOTA_STATE_ISSUE" "$QUOTA_STATE_ISSUE" \
            > /tmp/escalate-body.md

          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body-file /tmp/escalate-body.md

      # ── Quota exhausted: park lower-priority tasks ───────────────────────────
      - name: Park task until quota reset
        if: |
          steps.quota.outputs.exhausted == 'true' &&
          steps.quota.outputs.priority != 'high' &&
          steps.quota.outputs.priority != 'critical'
        env:
          GH_TOKEN:           ${{ github.token }}
          REPO:               ${{ github.repository }}
          ISSUE_NUMBER:       ${{ github.event.issue.number }}
          QUOTA_STATE_ISSUE:  ${{ env.QUOTA_STATE_ISSUE }}
        run: |
          RESET=$(python3 -c "
          import datetime
          d = datetime.datetime.utcnow().replace(day=1) + datetime.timedelta(days=32)
          print(d.replace(day=1).strftime('%Y-%m-%d'))
          ")
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "pending:quota"

          printf '**Copilot quota exhausted — task parked until ~%s**\n\nThe monthly quota-reset cron will re-fire dispatch automatically.\nTo unpark urgently: add `priority:high` and re-apply `exec:copilot`.\n\nState: [quota state issue #%s](../../issues/%s)\n' \
            "$RESET" "$QUOTA_STATE_ISSUE" "$QUOTA_STATE_ISSUE" \
            > /tmp/park-body.md

          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body-file /tmp/park-body.md
