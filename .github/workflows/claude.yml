name: Claude Code

# Fires when a repo member writes "@claude <instruction>" in an issue or PR
# comment / body / review. Runs Claude Code against a Claude Code Max
# subscription via CLAUDE_CODE_OAUTH_TOKEN (no API billing).
#
# Security posture:
#   * Restricted to repo members / owners / collaborators — external
#     contributors cannot trigger this workflow (author_association filter).
#   * 15-minute job timeout so a stuck run can't drain subscription compute.
#   * Skips the `assigned` issue trigger — @claude in body/title is what
#     matters, and `assigned` fires on every assignment change (wasteful).
#
# Code reviews are delegated to GitHub Copilot (housekeeping tier) — this
# workflow is reserved for targeted human-initiated Claude requests only.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, edited]
  pull_request_review:
    types: [submitted]

concurrency:
  # Cancel earlier runs on the same issue/PR — comment edits and rapid
  # re-mentions shouldn't pile up duplicate Claude invocations.
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude:
    if: |
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
      &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.sender.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
