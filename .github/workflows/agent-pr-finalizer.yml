# Daily agent PR finalizer — triage CI + Copilot review, dispatch fixes, enable merge.
name: Agent PR finalizer

on:
  schedule:
    - cron: "0 7 * * *"  # 07:00 UTC daily
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Report only (true) or apply fixes and automerge labels (false)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: agent-pr-finalizer
  cancel-in-progress: false

jobs:
  finalize:
    name: Finalize agent PRs
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Evaluate agent PRs
        id: eval
        env:
          GH_TOKEN: ${{ secrets.DIGITHINGS_PROJECT_TOKEN || github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 scripts/finalize_agent_prs.py --repo "$REPO" --json > /tmp/pr-actions.json
          echo "actions<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/pr-actions.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          python3 scripts/finalize_agent_prs.py --repo "$REPO"

      - name: Apply finalizer actions
        env:
          GH_TOKEN: ${{ secrets.DIGITHINGS_PROJECT_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          COPILOT_BASE_REF: develop
        run: |
          set -euo pipefail
          # Scheduled runs default to live; manual dispatch defaults to dry_run=true.
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            DRY_RUN="false"
          fi

          python3 <<'PY'
          import json
          import os
          import subprocess
          import sys
          from datetime import UTC, datetime

          repo = os.environ["REPO"]
          token = os.environ["GH_TOKEN"]
          dry_run = os.environ.get("DRY_RUN", "false").lower() == "true"
          env = {**os.environ, "GH_TOKEN": token}
          marker = "**Agent PR finalizer**"

          def gh(*args: str) -> str:
              return subprocess.check_output(["gh", *args], text=True, env=env)

          def run(cmd: list[str]) -> None:
              if dry_run:
                  print(f"[dry-run] {' '.join(cmd)}")
                  return
              subprocess.run(cmd, check=True, env=env)

          def recent_finalizer_comment(pr_number: int) -> bool:
              data = json.loads(gh("pr", "view", str(pr_number), "--repo", repo, "--json", "comments"))
              for comment in data.get("comments", []):
                  if marker in (comment.get("body") or ""):
                      return True
              return False

          actions = json.load(open("/tmp/pr-actions.json"))
          print(f"Processing {len(actions)} agent PR(s) (dry_run={dry_run})")

          for action in actions:
              pr = action["pr_number"]
              state = action["state"]
              branch = action["head_branch"]
              reason = action["reason"]
              issue = action.get("issue_number")
              fix_via = action.get("fix_via")

              if state == "skip":
                  continue

              if state == "waiting" and reason == "request Copilot review":
                  print(f"PR #{pr}: request Copilot review")
                  run(["gh", "pr", "edit", str(pr), "--repo", repo, "--add-reviewer", "Copilot"])
                  continue

              if state == "needs_human":
                  print(f"PR #{pr}: needs human — {reason}")
                  body = (
                      f"{marker} | {datetime.now(UTC).strftime('%Y-%m-%d %H:%M UTC')}\n\n"
                      f"**Manual review required** — not enabling auto-merge.\n\nReason: {reason}"
                  )
                  if not dry_run:
                      gh("pr", "edit", str(pr), "--repo", repo, "--add-label", "needs-human-review")
                      gh("pr", "comment", str(pr), "--repo", repo, "--body", body)
                  else:
                      print(body)
                  continue

              if state == "needs_fix":
                  if recent_finalizer_comment(pr):
                      print(f"PR #{pr}: skip fix dispatch (finalizer already commented)")
                      continue
                  body = (
                      f"{marker} | {datetime.now(UTC).strftime('%Y-%m-%d %H:%M UTC')}\n\n"
                      f"Dispatching fix for: {reason}\n"
                      f"Branch: `{branch}`"
                  )
                  print(f"PR #{pr}: needs fix via {fix_via} — {reason}")
                  if dry_run:
                      print(body)
                      continue
                  gh("pr", "comment", str(pr), "--repo", repo, "--body", body)
                  if fix_via == "cursor" and os.environ.get("CURSOR_API_KEY"):
                      prompt = (
                          f"Fix PR #{pr} on branch {branch} in {repo}. "
                          f"Reason: {reason}. Read AGENTS.md, fix CI and review feedback, push to {branch}. "
                          "Do not widen scope."
                      )
                      subprocess.run(
                          [
                              "bash",
                              "-lc",
                              f'curl -fsSL "https://cursor.com/install" | bash && '
                              f'export PATH="$HOME/.cursor/bin:$PATH" && '
                              f'cursor-agent --force --workspace "$GITHUB_WORKSPACE" -p {json.dumps(prompt)}',
                          ],
                          check=False,
                          env=env,
                      )
                  elif fix_via == "copilot" and issue:
                      instructions = (
                          f"Fix PR #{pr} ({branch}). {reason}. "
                          "Address CI failures and review comments; push to the existing branch."
                      )
                      run(
                          [
                              "python3",
                              "scripts/assign_copilot_agent.py",
                              str(issue),
                              "--repo",
                              repo.split("/")[-1],
                              "--instructions",
                              instructions,
                          ]
                      )
                  continue

              if state == "ready_merge":
                  print(f"PR #{pr}: ready for automerge — {reason}")
                  run(["gh", "pr", "edit", str(pr), "--repo", repo, "--add-label", "automerge-agent"])
                  run(["gh", "pr", "merge", str(pr), "--repo", repo, "--auto", "--squash"])
                  continue

              print(f"PR #{pr}: {state} — {reason} (no action)")
          PY
