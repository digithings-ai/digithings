name: "Test: olympus"

on:
  workflow_call:


jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Canon ratchet (#1404) — see frontend/digiweb/MIGRATION.md
      - name: Frontend canon guard
        run: python3 scripts/check_frontend_canon.py

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install (root workspaces)
        run: npm install --no-audit --no-fund --include=optional

      # GHA npm cache can omit platform optional deps (npm/cli#4828); vitest needs rolldown.
      - name: Install Linux native bindings
        run: |
          npm install \
            @rolldown/binding-linux-x64-gnu@1.0.0-rc.16 \
            lightningcss-linux-x64-gnu@1.32.0 \
            @tailwindcss/oxide-linux-x64-gnu@4.2.2 \
            --no-save --no-audit --no-fund

      - name: Lint
        run: npm run lint --workspace olympus

      - name: Build
        run: npm run build --workspace olympus

      - name: Test
        run: npm run test --workspace olympus
