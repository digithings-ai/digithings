name: PR hygiene

# Lightweight PR gates: issue linkage (every PR) + agent-task TSV coverage (path-gated).
# One workflow dispatch instead of separate pr-linkage + project-fields-coverage runs.
# TSV coverage also runs on schedule to catch gaps outside PRs.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  check-linkage:
    name: Require Fixes #N or task/N-* branch
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check linkage
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          # Bypass: module/<component> -> develop is an umbrella PR; the
          # underlying task PRs already carried individual issue linkage,
          # so requiring Fixes #N on the roll-up is redundant.
          if [[ "$PR_BRANCH" =~ ^module/ ]]; then
            echo "OK — module umbrella PR ($PR_BRANCH); underlying task PRs carry issue linkage"
            exit 0
          fi

          # Implicit link: task/<N>-<slug> branch.
          if [[ "$PR_BRANCH" =~ ^task/([0-9]+)- ]]; then
            echo "OK — branch '$PR_BRANCH' implicitly links to issue #${BASH_REMATCH[1]}"
            exit 0
          fi

          # Explicit link: Fixes/Closes/Resolves #N in body or title.
          haystack=$'\n'"${PR_BODY:-}"$'\n'"${PR_TITLE:-}"
          if printf '%s' "$haystack" | grep -Eqi '(^|[^[:alnum:]_])(fixes|closes|resolves)[[:space:]]+#[0-9]+'; then
            echo "OK — PR references an issue via Fixes/Closes/Resolves keyword"
            exit 0
          fi

          cat <<MSG >&2
          ❌ This PR is not linked to an issue.

          Link it one of two ways:
            • Use a branch named  task/<N>-<slug>   (recommended; created by 'make task ISSUE=N')
            • Add a line to the PR body:  Fixes #<N>   (or 'Closes #N' / 'Resolves #N')

          Rationale: every code change must trace back to a backlog item on the
          GitHub Project board. See docs/agents/AGENT_WORKFLOW.md.
          MSG
          exit 1

  path-filter:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tsv: ${{ steps.filter.outputs.tsv }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            tsv:
              - 'scripts/project_fields.tsv'
              - '.github/workflows/pr-hygiene.yml'

  coverage:
    name: All agent-task issues in TSV with real phase and valid model
    needs: path-filter
    if: |
      always() && (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'pull_request' &&
         needs.path-filter.result == 'success' &&
         needs.path-filter.outputs.tsv == 'true')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check TSV coverage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TSV="scripts/project_fields.tsv"
          FAIL=0

          # Fetch all open issues labelled agent-task (paginates automatically via gh).
          OPEN_ISSUES=$(gh issue list \
            --label agent-task \
            --state open \
            --limit 500 \
            --json number,title \
            --jq '.[] | "\(.number)\t\(.title)"')

          if [[ -z "$OPEN_ISSUES" ]]; then
            echo "No open agent-task issues — nothing to check."
            exit 0
          fi

          echo "Checking open agent-task issues against $TSV …"
          echo ""

          while IFS=$'\t' read -r NUM TITLE; do
            # (a) Missing row.
            if ! grep -q "^${NUM}	" "$TSV" 2>/dev/null; then
              echo "❌  #${NUM} «${TITLE}» — missing from $TSV"
              FAIL=1
              continue
            fi

            # (b) + (c) Extract phase, column count, and model (tab-separated — phase names contain spaces).
            IFS=$'\t' read -r PHASE COL_COUNT MODEL < <(awk -F'\t' -v n="$NUM" '$1==n {printf "%s\t%s\t%s\n", $2, NF, $6; exit}' "$TSV")

            # (b) Placeholder phase: raw phase-N string instead of full name with em-dash.
            if echo "$PHASE" | grep -Eqi '^phase-[0-9]+$'; then
              echo "❌  #${NUM} «${TITLE}» — phase is still a placeholder: «${PHASE}»"
              FAIL=1
              continue
            fi

            # (c) Model column: must be present (6 columns) and valid (sonnet or opus).
            if [[ "$COL_COUNT" -lt 6 || ( "$MODEL" != "sonnet" && "$MODEL" != "opus" ) ]]; then
              echo "❌  #${NUM} «${TITLE}» — invalid or missing model value: «${MODEL}» (must be sonnet or opus)"
              FAIL=1
              continue
            fi

            echo "✅  #${NUM} — phase: ${PHASE} | model: ${MODEL}"
          done <<< "$OPEN_ISSUES"

          echo ""
          if [[ "$FAIL" -eq 1 ]]; then
            cat <<MSG >&2

          One or more open agent-task issues are missing from scripts/project_fields.tsv,
          still have a placeholder phase value, or have an invalid model value.

          To fix:
            1. Add or update the row in scripts/project_fields.tsv (tab-separated, 6 columns):
                 <issue>  <phase>  <area>  <kind>  <priority>  <model>
               Use exact strings from set_project_fields.sh (em-dash in phase names).
               model must be sonnet (standard tasks) or opus (complex/high-risk tasks).
            2. Run scripts/set_project_fields.sh to sync the live Project board.
            3. Commit and push — this check will re-run on the PR.

          MSG
            exit 1
          fi
          echo "All open agent-task issues are covered with real project fields. ✅"
