name: olympus tests

on:
  workflow_call:
  push:
    branches: [main, develop]
    paths:
      - "frontend/olympus/**"
      - "frontend/design/**"
      - "package.json"
      - ".github/workflows/olympus-test.yml"
  pull_request:
    paths:
      - "frontend/olympus/**"
      - "frontend/design/**"
      - "package.json"
      - ".github/workflows/olympus-test.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install (root workspaces)
        run: npm install --no-audit --no-fund --include=optional

      # GHA npm cache can omit platform optional deps (npm/cli#4828); vitest needs rolldown.
      - name: Ensure rolldown linux binding
        run: npm install @rolldown/binding-linux-x64-gnu@1.0.0-rc.16 --no-save --no-audit --no-fund

      - name: Ensure lightningcss linux binding
        run: npm install lightningcss-linux-x64-gnu@1.32.0 --no-save --no-audit --no-fund

      - name: Lint
        run: npm run lint --workspace olympus

      - name: Build
        run: npm run build --workspace olympus

      - name: Test
        run: npm run test --workspace olympus
