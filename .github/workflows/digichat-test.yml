name: digichat tests

on:
  workflow_call:
  push:
    branches: [main, develop]
    paths:
      - "frontend/digichat/**"
      - "frontend/design/**"
      - "package.json"
      - ".github/workflows/digichat-test.yml"
  pull_request:
    paths:
      - "frontend/digichat/**"
      - "frontend/design/**"
      - "package.json"
      - ".github/workflows/digichat-test.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      # Install at the monorepo root so npm wires the workspace symlink for
      # @digithings/design, then run the digichat scripts in-workspace.
      # Use `--no-audit --no-fund` to keep CI output focused.
      - name: Install (root workspaces)
        run: npm install --no-audit --no-fund --include=optional

      # GHA npm cache can omit platform optional deps (npm/cli#4828); vitest needs rolldown.
      - name: Ensure rolldown linux binding
        run: npm install @rolldown/binding-linux-x64-gnu@1.0.0-rc.16 --no-save --no-audit --no-fund

      - name: Lint
        run: npm run lint --workspace digichat

      - name: Test
        run: npm run test --workspace digichat

      - name: Build
        env:
          AUTH_SECRET: ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-local
          DIGIGRAPH_INTERNAL_URL: http://127.0.0.1:8000
        run: npm run build --workspace digichat
