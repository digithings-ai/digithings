name: digichat tests

on:
  workflow_call:
  push:
    branches: [main, develop]
    paths:
      - "frontend/digichat/**"
      - "frontend/design/**"
      - "package.json"
      - ".github/workflows/digichat-test.yml"
  pull_request:
    paths:
      - "frontend/digichat/**"
      - "frontend/design/**"
      - "package.json"
      - ".github/workflows/digichat-test.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          # No npm cache: GHA cache restores can omit platform optional native deps (npm/cli#4828).

      # Install at the monorepo root so npm wires the workspace symlink for
      # @digithings/design, then run the digichat scripts in-workspace.
      - name: Install (root workspaces)
        run: npm ci --no-audit --no-fund --include=optional

      - name: Lint
        run: npm run lint --workspace digichat

      - name: Test
        run: npm run test --workspace digichat

      - name: Build
        env:
          AUTH_SECRET: ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-local
          DIGIGRAPH_INTERNAL_URL: http://127.0.0.1:8000
        run: npm run build --workspace digichat
