# Route issues to the correct project board(s) based on component label.
#
# Model:
#   - Every non-epic issue → its module project (based on component:* label).
#   - Epics + cross-cutting issues → Project #1 (digithings).
#   - SITAAS-labeled → Project #10.
#
# Replaces issue-to-project.yml and issue-to-digiquant-project.yml.
# Per-module boards: digiquant=#2, digigraph=#3, digisearch=#4, digichat=#5,
# digikey=#6, digismith=#7, digiclaw=#8, digibase=#9.

name: Route issues to projects

on:
  issues:
    types: [opened, reopened, transferred, labeled]

permissions:
  contents: read

jobs:
  route:
    name: Add issue to the correct project board(s)
    runs-on: ubuntu-latest
    steps:
      - name: Check token present
        id: token
        env:
          TOKEN: ${{ secrets.DIGITHINGS_PROJECT_TOKEN }}
        run: |
          if [[ -n "${TOKEN:-}" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Secret DIGITHINGS_PROJECT_TOKEN not set — skipping routing. Create a PAT with 'project' + 'repo' scopes and store it as DIGITHINGS_PROJECT_TOKEN."
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute target projects from labels
        id: targets
        if: steps.token.outputs.present == 'true'
        env:
          LABELS: ${{ toJson(github.event.issue.labels) }}
        run: |
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          labels = {l["name"] for l in json.loads(os.environ["LABELS"])}

          component_to_project = {
              "component:digiquant":  2,
              "component:digigraph":  3,
              "component:digisearch": 4,
              "component:digichat":   5,
              "component:digikey":    6,
              "component:digismith":  7,
              "component:digiclaw":   8,
              "component:digibase":   9,
          }
          targets = set()
          is_epic = "epic" in labels
          is_sitaas = "sitaas" in labels
          module_proj = next((p for lab, p in component_to_project.items() if lab in labels), None)

          if is_sitaas:
              targets.add(10)
          if is_epic:
              targets.add(1)
              if module_proj:
                  targets.add(module_proj)
          elif module_proj:
              targets.add(module_proj)
          else:
              # component:root (or no component) → Project #1 for cross-cutting visibility.
              targets.add(1)

          print(f"projects={','.join(str(t) for t in sorted(targets))}")
          PY

      - name: Add to each target project
        if: steps.token.outputs.present == 'true' && steps.targets.outputs.projects != ''
        env:
          GH_TOKEN: ${{ secrets.DIGITHINGS_PROJECT_TOKEN }}
          TARGETS: ${{ steps.targets.outputs.projects }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          set -euo pipefail
          IFS=',' read -ra PROJ_NUMS <<< "$TARGETS"
          for num in "${PROJ_NUMS[@]}"; do
            echo "Adding ${ISSUE_URL} to Project #${num}..."
            gh project item-add "$num" --owner digithings-ai --url "$ISSUE_URL" || {
              echo "::warning::Failed to add to Project #${num} (may already exist or token lacks scope)"
            }
          done
