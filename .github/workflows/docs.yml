# Markdown link integrity + agent-instruction surface drift check
name: Docs

on:
  push:
    branches: [main, develop]
  pull_request:
    paths:
      - "docs/**"
      - "**/*.md"
      - "agents.yml"
      - "agents/**"
      - ".cursor/**"
      - ".github/copilot-instructions.md"
      - "scripts/check_doc_links.py"
      - "scripts/agents_init.py"
      - ".github/workflows/docs.yml"

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docs-and-agents-init:
    name: doc-links + agents-init
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pyyaml
        run: python3 -m pip install pyyaml

      - name: Check internal markdown links
        run: python3 scripts/check_doc_links.py

      - name: Verify generated files are in sync
        run: python3 scripts/agents_init.py --check
