# Markdown link integrity + agent-instruction surface drift check
name: Docs

on:
  push:
    branches: [main, develop]
  pull_request:
    paths:
      - "docs/**"
      - "**/*.md"
      - "agents.yml"
      - "agents/**"
      - ".cursor/**"
      - ".github/copilot-instructions.md"
      - "scripts/check_doc_links.py"
      - "scripts/agents_init.py"
      - ".github/workflows/docs.yml"

jobs:
  doc-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check internal markdown links
        run: python3 scripts/check_doc_links.py

  agents-init-idempotent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pyyaml
        run: python3 -m pip install pyyaml

      - name: Verify generated files are in sync
        run: python3 scripts/agents_init.py --check
