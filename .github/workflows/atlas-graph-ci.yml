name: atlas graph ci

# Unit tests + lint + actionlint for the Atlas sub-graph package and its
# scheduler workflows. Scoped with path filters so it only runs when
# something in apps/digiquant-atlas/ or .github/workflows/atlas-*.yml changes.

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/digiquant-atlas/**"
      - ".github/workflows/atlas-*.yml"
  pull_request:
    paths:
      - "apps/digiquant-atlas/**"
      - ".github/workflows/atlas-*.yml"

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install workspace (dependency-ordered; includes digismith)
        run: |
          bash scripts/install-workspace.sh --with-dev apps/digiquant-atlas

      - name: Ruff check
        run: ruff check apps/digiquant-atlas/src apps/digiquant-atlas/tests

      - name: Ruff format check
        run: ruff format --check apps/digiquant-atlas/src apps/digiquant-atlas/tests

      - name: Pytest
        run: pytest -m unit apps/digiquant-atlas/tests/ -v --tb=short

  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          files: ".github/workflows/atlas-*.yml"
