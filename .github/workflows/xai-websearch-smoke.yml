name: xAI web_search smoke (#650)

# One-off manual probe of xAI Agent Tools `web_search` via the Responses API,
# to capture the response/citation shape before wiring the grounding pre-pass.
# Dispatch-only; minimal install; ~1 cheap Grok call per case.

on:
  workflow_dispatch:
    inputs:
      model:
        description: "xAI model id"
        required: false
        default: "grok-4.3"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      XAI_SMOKE_MODEL: ${{ inputs.model }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install openai
        run: python -m pip install -U pip openai
      - name: Probe responses.create + web_search
        run: python digiquant/scripts/atlas/smoke_xai_websearch.py
