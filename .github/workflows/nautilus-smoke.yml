name: nautilus smoke

on:
  workflow_call:
  push:
    branches: [main, develop]
    paths: ["digiquant/**", "tests/dq/test_nautilus_runner.py"]
  pull_request:
    paths: ["digiquant/**", "tests/dq/test_nautilus_runner.py"]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install digiquant with Nautilus extra
        run: |
          python -m pip install -U pip
          pip install -e "./digibase[dev]"
          pip install -e "./digikey[dev]"
          pip install -e "./digiquant[dev,nautilus]"
          pip install pandas cryptography

      - name: Nautilus runner unit smoke
        run: python -m pytest tests/dq/test_nautilus_runner.py -m unit -v --tb=short
