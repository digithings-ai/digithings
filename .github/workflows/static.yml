# Deploy digithings.ai static landing page to GitHub Pages.
#
# The site lives at frontend/website/ and references shared tokens / JS /
# assets at frontend/design-system/ via ../design-system/… paths. The job
# below stages a dist/ directory that mirrors that layout so Pages can
# serve both trees from a single artifact.
name: Deploy static content to Pages

on:
  push:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Assemble Pages bundle
        # Pages artifact layout:
        #   /                → frontend/website/ (landing page root)
        #   /design-system/  → frontend/design-system/ (shared tokens/JS/assets)
        # Relative refs like `../design-system/tokens.css` resolve correctly
        # from any page under /.
        run: |
          mkdir -p dist
          cp -r frontend/website/. dist/
          cp -r frontend/design-system dist/design-system

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
