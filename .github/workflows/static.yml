# RETIRED — digithings.ai is now served by Cloudflare Pages (project: digithings-ai).
# Cloudflare watches `develop` and runs `bash scripts/build-digithings.sh`.
# Kept for history; push trigger removed so it no longer fires automatically.
name: Deploy static content to Pages (retired)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type RETIRED to confirm you intend to run this legacy workflow"
        required: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Assemble Pages bundle
        # Pages artifact layout:
        #   /                → frontend/digithings/ (landing page root)
        #   /design/  → frontend/design/ (shared tokens/JS/assets)
        # Relative refs like `../design/tokens.css` resolve correctly
        # from any page under /.
        run: |
          mkdir -p dist
          cp -r frontend/digithings/. dist/
          cp -r frontend/design dist/design

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
