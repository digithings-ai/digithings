name: digibase tests

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install -U pip
          # tests/conftest.py imports digikey for shared JWT fixtures; install both from the monorepo.
          pip install -e "./digibase[dev]" -e "./digikey"

      - name: Ruff
        run: python -m ruff check digibase/src tests/db

      - name: Unit tests (tests/db + request-id hops)
        run: |
          python -m pytest tests/db tests/integration/test_request_id_hops.py -m unit -v --tb=short
