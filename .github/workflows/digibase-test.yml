name: digibase tests

on:
  workflow_call:
  push:
    branches: [main, develop]
    paths: ["digibase/**"]
  pull_request:
    paths: ["digibase/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e "./digibase[dev]"

      - name: Ruff
        run: python -m ruff check digibase/src
