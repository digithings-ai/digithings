name: Cursor agent dispatch

# Fires when exec:cursor label is applied to an issue.
# Uses the official Cursor CLI to dispatch a Background Agent.
# Ref: https://cursor.com/docs/cli/github-actions
#
# Required secret: CURSOR_API_KEY
#   Cursor Settings -> Account -> API Keys -> New Key
#   GitHub repo Settings -> Secrets -> Actions -> CURSOR_API_KEY
#
# Note: the @cursor comment trigger only responds to human-posted comments,
# not GitHub Actions bot comments. The Cursor CLI is the correct automated path.

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  dispatch:
    name: Dispatch to Cursor agent
    runs-on: ubuntu-latest
    if: github.event.label.name == 'exec:cursor'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve component metadata
        id: meta
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE:  ${{ github.event.issue.title }}
        run: |
          LABELS='${{ toJson(github.event.issue.labels) }}'
          COMPONENT=$(echo "$LABELS" | python3 -c "
          import json, sys, re
          labels = json.load(sys.stdin)
          for l in labels:
              m = re.match(r'^component:(.+)$', l['name'])
              if m:
                  print(m.group(1))
                  break
          " 2>/dev/null || echo "root")

          declare -A AGENTS_MD=(
            [digigraph]="digigraph/AGENTS.md"   [digiquant]="digiquant/AGENTS.md"
            [digisearch]="digisearch/AGENTS.md" [digikey]="digikey/AGENTS.md"
            [digismith]="digismith/AGENTS.md"   [digiclaw]="digiclaw/AGENTS.md"
            [digibase]="digibase/AGENTS.md"     [digichat]="frontend/digichat/AGENTS.md"
            [root]="AGENTS.md"
          )
          declare -A TEST_CMD=(
            [digigraph]="pytest -m unit -k digigraph -v --tb=short"
            [digiquant]="pytest -m unit -k digiquant -v --tb=short"
            [digisearch]="pytest -m unit -k digisearch -v --tb=short"
            [digikey]="pytest -m unit -k digikey -v --tb=short"
            [digismith]="pytest -m unit -k digismith -v --tb=short"
            [digiclaw]="pytest -m unit -k digiclaw -v --tb=short"
            [digibase]="pytest -m unit -k digibase -v --tb=short"
            [digichat]="npm run test --prefix frontend/digichat"
            [root]="pytest -m unit -v --tb=short"
          )

          AGENTS_PATH="${AGENTS_MD[$COMPONENT]:-AGENTS.md}"
          TEST="${TEST_CMD[$COMPONENT]:-pytest -m unit -v --tb=short}"
          BRANCH_SLUG=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' |
                        sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-40 | sed 's/-$//')

          echo "component=$COMPONENT"                              >> "$GITHUB_OUTPUT"
          echo "agents_path=$AGENTS_PATH"                          >> "$GITHUB_OUTPUT"
          echo "test_cmd=$TEST"                                    >> "$GITHUB_OUTPUT"
          echo "branch=cursor/${ISSUE_NUMBER}-${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"

      - name: Install Cursor CLI
        id: install_cli
        continue-on-error: true
        run: |
          curl -fsSL "https://cursor.com/install" | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Run cursor-agent
        id: run_agent
        continue-on-error: true
        if: ${{ secrets.CURSOR_API_KEY != '' }}
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_TOKEN:   ${{ github.token }}
          ISSUE_NUMBER:   ${{ github.event.issue.number }}
          ISSUE_TITLE:    ${{ github.event.issue.title }}
          ISSUE_URL:      ${{ github.event.issue.html_url }}
          COMPONENT:      ${{ steps.meta.outputs.component }}
          AGENTS_PATH:    ${{ steps.meta.outputs.agents_path }}
          TEST_CMD:       ${{ steps.meta.outputs.test_cmd }}
          BRANCH:         ${{ steps.meta.outputs.branch }}
          REPO:           ${{ github.repository }}
        run: |
          cursor-agent --force \
            -p "You are working on the DigiThings repository ($REPO).
          Task: $ISSUE_TITLE
          Issue: $ISSUE_URL
          Component: $COMPONENT
          Branch to create: $BRANCH

          Rules (non-negotiable):
          - Read $AGENTS_PATH before writing any code
          - Polars only (no pandas), Pydantic v2, ruff-clean, no comments unless WHY is non-obvious
          - Never touch: .github/workflows/, docs/scoring/, SECURITY.md, digikey/
          - Gate before PR: make score && $TEST_CMD && ruff check .
          - PR title: feat($COMPONENT): $ISSUE_TITLE (#$ISSUE_NUMBER)
          - PR body must contain: Closes #$ISSUE_NUMBER
          - Scope too large? Relabel exec:claude, comment why, stop.
          Full protocol: docs/agents/CURSOR_AGENT_ONBOARDING.md" \
            --model claude-sonnet-4-5

      - name: Post dispatch comment
        if: always()
        env:
          GH_TOKEN:        ${{ github.token }}
          REPO:            ${{ github.repository }}
          ISSUE_NUMBER:    ${{ github.event.issue.number }}
          TEST_CMD:        ${{ steps.meta.outputs.test_cmd }}
          BRANCH:          ${{ steps.meta.outputs.branch }}
          REPO_URL:        ${{ github.server_url }}/${{ github.repository }}
          ISSUE_URL:       ${{ github.event.issue.html_url }}
          INSTALL_OUTCOME: ${{ steps.install_cli.outcome }}
          AGENT_OUTCOME:   ${{ steps.run_agent.outcome }}
        run: |
          LINK="cursor://anysphere.cursor-deeplink/open-agent?repoUrl=${REPO_URL}.git&issueUrl=${ISSUE_URL}"
          if [ "$INSTALL_OUTCOME" != "success" ]; then
            STATUS="CLI install failed — using deep-link fallback below"
          elif [ "$AGENT_OUTCOME" = "success" ]; then
            STATUS="CLI dispatched"
          elif [ "$AGENT_OUTCOME" = "skipped" ]; then
            STATUS="Add CURSOR_API_KEY secret to enable CLI dispatch"
          else
            STATUS="CLI dispatch failed — check Actions log"
          fi
          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" \
            --body "**Cursor dispatch** | ${STATUS} | Branch: \`${BRANCH}\` | Gate: \`make score && ${TEST_CMD} && ruff check .\` | [Open manually in Cursor](${LINK})"
