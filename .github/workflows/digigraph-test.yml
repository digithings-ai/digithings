name: digigraph tests

on:
  workflow_call:
  push:
    branches: [main, develop]
    paths: ["digigraph/**", "tests/dg/**"]
  pull_request:
    paths: ["digigraph/**", "tests/dg/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e "./digibase[dev]"
          pip install -e "./digikey[dev]"
          pip install -e "./digismith[dev]"
          pip install -e "./digigraph[dev,mcp]"
          pip install -e "./digiquant[nautilus]"
          pip install cryptography pytest-cov

      - name: Ruff
        run: |
          python -m ruff check digigraph/src
          python -m ruff format --check digigraph/src

      - name: Pytest
        run: |
          python -m pytest tests/dg/ tests/contracts/ -m unit -v --tb=short --cov=digigraph --cov-report=term-missing
