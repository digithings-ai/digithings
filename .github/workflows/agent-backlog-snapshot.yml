# Refresh docs/agent-backlog/generated-snapshot.md from open agent-task issues.
name: Agent backlog snapshot

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/agent_backlog_snapshot.py

      - name: Commit if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(docs): refresh agent backlog snapshot"
          file_pattern: docs/agent-backlog/generated-snapshot.md
