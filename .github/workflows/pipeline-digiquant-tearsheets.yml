name: "Pipeline: DigiQuant tearsheets"

# Daily Slapper tearsheet regeneration for digiquant.io (#1068, #1069).
#
# DB-driven delivery: the job regenerates and upserts the tearsheet payload
# (headline metrics + equity curve + trade list + current signal) to Supabase
# `strategy_tearsheets`. digiquant.io reads that table live at runtime, so there
# is NO repo commit and NO deploy in this path — updating the row updates the site.
#
# Prerequisite (#1067): calibrations uploaded to strategy_calibrations via
# digiquant/scripts/sync_strategy_calibrations.py (one-time, service role).
#
# 1. Fetch latest Coinbase daily OHLCV
# 2. Backtest with calibrations from Supabase (private IP — never in repo/CI secrets)
# 3. Upsert the tearsheet payload + current signal to Supabase (service role)

on:
  schedule:
    # 00:00 UTC — after Coinbase daily close; fresh signal for digiquant.io tearsheets
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  tearsheets:
    name: Regenerate Slapper tearsheets
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: digiquant-tearsheets
      cancel-in-progress: false
    env:
      CORE_SUPABASE_URL: ${{ secrets.CORE_SUPABASE_URL || secrets.SUPABASE_URL }}
      CORE_SUPABASE_SERVICE_KEY: ${{ secrets.CORE_SUPABASE_SERVICE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_URL: ${{ secrets.CORE_SUPABASE_URL || secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CORE_SUPABASE_SERVICE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            digibase/pyproject.toml
            digikey/pyproject.toml
            digiquant/pyproject.toml

      - name: Install digiquant (nautilus + store)
        run: |
          python -m pip install -U pip
          pip install -e "./digibase"
          pip install -e "./digikey"
          pip install -e "./digiquant[nautilus,prices]"
          pip install ccxt

      - name: Verify calibrations exist in Supabase
        run: python digiquant/scripts/verify_strategy_calibrations_rls.py

      - name: Fetch Coinbase daily OHLCV
        run: python digiquant/scripts/fetch_coinbase.py --through-yesterday

      - name: Generate tearsheets + push to Supabase
        # --push-supabase: upsert the tearsheet payload + current signal to
        # strategy_tearsheets (service role). --signal-delay-days 3 (#1462):
        # public figures lag reality by 3 days (end-date shift) so the live
        # position can't be read off the curve. No repo commit — the DB is the
        # delivery; digiquant.io reads strategy_tearsheets live.
        run: |
          python digiquant/scripts/generate_tearsheets.py \
            --from-supabase \
            --push-supabase \
            --signal-delay-days 3

      - name: Update persistent failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const stamp = new Date().toISOString().slice(0, 16);
            const title = "digiquant-tearsheets — recurring failures";
            const labels = ["ci-failure", "component:digiquant", "pipeline:tearsheets"];
            const marker = "<!-- digiquant-tearsheets-tracker -->";
            const failLine = `- ${stamp} — [run ${context.runId}](${runUrl})`;

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "ci-failure,pipeline:tearsheets",
              per_page: 100,
            });
            const tracker = existing.find((i) => (i.body || "").includes(marker));

            if (tracker) {
              const MAX_LINES = 20;
              const body = tracker.body || "";
              const parts = body.split("## Recent failures");
              const header = parts[0];
              const tailRaw = (parts[1] || "").split("\n").filter((l) => l.startsWith("- "));
              const tail = [failLine, ...tailRaw].slice(0, MAX_LINES).join("\n");
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: tracker.number,
                body: `${header.trim()}\n\n## Recent failures (latest first)\n${tail}`,
              });
            } else {
              const body = [
                marker,
                "## Persistent tracker for digiquant-tearsheets failures",
                "",
                "Scheduled Slapper tearsheet pipeline (`0 0 * * *`) has been failing.",
                "",
                "**Likely causes:** missing strategy_calibrations (run sync_strategy_calibrations.py),",
                "Nautilus crash on Linux, Coinbase/ccxt outage, Supabase credentials.",
                "",
                "## Recent failures (latest first)",
                failLine,
              ].join("\n");
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels,
              });
            }
