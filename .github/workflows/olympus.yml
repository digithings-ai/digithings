name: Olympus research pipeline

# Unified Atlas+Hermes cron (replaces atlas-baseline/delta/monthly/fed-odds).
# resolve job: Sat 12:00 -> baseline, weekday 12:00 -> delta, 28-31 14:00 -> monthly
# (last-weekday guard). Tunables: .github/olympus-pipeline.yml.

on:
  schedule:
    - cron: "0 12 * * MON-SAT"
    - cron: "0 14 28-31 * *"
  workflow_dispatch:
    inputs:
      run_type:
        description: "Run type. 'auto' infers baseline/delta from the day."
        type: choice
        options:
          - auto
          - baseline
          - delta
          - monthly
        default: auto
      run_date:
        description: "Logical run date (YYYY-MM-DD). Defaults to today UTC."
        required: false
        default: ""
      force_monthly:
        description: "Skip the last-weekday-of-month guard (monthly backfills)."
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Compile + validate inputs only (no LLM calls / no writes)."
        required: false
        type: boolean
        default: false
      resume_run_id:
        description: "Resume a prior run's checkpoints (its GITHUB_RUN_ID). Empty = fresh run."
        required: false
        default: ""

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: olympus-pipeline
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      run_type: ${{ steps.decide.outputs.run_type }}
      run_date: ${{ steps.decide.outputs.run_date }}
      proceed: ${{ steps.decide.outputs.proceed }}
    steps:
      - name: Decide run type and schedule eligibility
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          INPUT_RUN_TYPE: ${{ inputs.run_type }}
          INPUT_RUN_DATE: ${{ inputs.run_date }}
          FORCE_MONTHLY: ${{ inputs.force_monthly }}
        run: |
          set -euo pipefail

          today_dow=$(date -u +%u)   # 1=Mon .. 7=Sun

          # dispatch override > monthly cron > day-of-week
          if [ "$EVENT_NAME" = "workflow_dispatch" ] \
             && [ -n "${INPUT_RUN_TYPE:-}" ] && [ "${INPUT_RUN_TYPE}" != "auto" ]; then
            run_type="${INPUT_RUN_TYPE}"
          elif [ "${SCHEDULE:-}" = "0 14 28-31 * *" ]; then
            run_type="monthly"
          elif [ "$today_dow" -eq 6 ]; then
            run_type="baseline"
          else
            run_type="delta"
          fi

          # Monthly: gate to last weekday (GitHub cron has no `L` specifier).
          proceed=true
          if [ "$run_type" = "monthly" ] && [ "${FORCE_MONTHLY:-}" != "true" ]; then
            if [ "$today_dow" -gt 5 ]; then
              proceed=false
              echo "Skipping monthly — weekend (dow=$today_dow)"
            else
              this_month=$(date -u +%Y-%m)
              later_weekday=""
              for offset in 1 2 3 4 5 6 7; do
                candidate=$(date -u -d "+$offset day" +%Y-%m-%d)
                cand_month=${candidate%-*}
                if [ "$cand_month" != "$this_month" ]; then
                  break
                fi
                if [ "$(date -u -d "$candidate" +%u)" -le 5 ]; then
                  later_weekday="$candidate"
                  break
                fi
              done
              if [ -n "$later_weekday" ]; then
                proceed=false
                echo "Skipping monthly — later weekday $later_weekday remains in $this_month"
              fi
            fi
          fi

          if [ -n "${INPUT_RUN_DATE:-}" ]; then
            run_date="${INPUT_RUN_DATE}"
          else
            run_date="$(date -u +%Y-%m-%d)"
          fi

          {
            echo "run_type=$run_type"
            echo "run_date=$run_date"
            echo "proceed=$proceed"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved: run_type=$run_type run_date=$run_date proceed=$proceed"

  run:
    needs: resolve
    if: needs.resolve.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    # 240 min — baseline worst case: 3 outer attempts x in-process LLM retry (#461).
    timeout-minutes: 240
    env:
      RUN_TYPE: ${{ needs.resolve.outputs.run_type }}
      RUN_DATE: ${{ needs.resolve.outputs.run_date }}
    steps:
      - name: Check out Olympus source
        uses: actions/checkout@v4
        with:
          ref: main   # scheduled triggers fire from default branch; code pinned to main (#814)

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            digibase/pyproject.toml
            digigraph/pyproject.toml
            digiquant/pyproject.toml

      - name: Install Olympus dependencies
        run: |
          bash scripts/install-workspace.sh digiquant
          pip install -e "./digiquant[atlas,prices]"
          pip install "langgraph-checkpoint-postgres>=2.0"   # resume (#665)

      - name: Load pipeline configuration
        run: |
          python3 -c "
          import yaml
          with open('.github/olympus-pipeline.yml') as fh:
              cfg = yaml.safe_load(fh) or {}
          for key, value in (cfg.get('env') or {}).items():
              print(f'{key}={value}')
          " >> "$GITHUB_ENV"

      - name: Ingest Fed rate-decision odds
        # Fail-soft Kalshi/Polymarket ingest before preflight; skipped for monthly.
        if: needs.resolve.outputs.run_type != 'monthly'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -o pipefail
          ARGS=(
            python -m digiquant prices fetch-macro
            --sources fedprob
            --manifest digiquant/src/digiquant/olympus/atlas/config/macro_series.yaml
          )
          if [ "${DRY_RUN:-}" = "true" ]; then
            ARGS+=(--dry-run)
          else
            ARGS+=(--supabase)
          fi
          "${ARGS[@]}" || echo "::warning::Fed rate-decision odds ingest failed (fail-soft) — pipeline continues"

      - name: Validate AI provider routing
        # Fail fast on routing misconfig (#802); skipped for monthly.
        if: needs.resolve.outputs.run_type != 'monthly'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python digiquant/scripts/atlas/validate-providers.py --skip-dry-run

      - name: Run Olympus research pipeline
        id: run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run }}
          DIGI_CHECKPOINTER_POSTGRES_URI: ${{ secrets.DIGI_CHECKPOINTER_POSTGRES_URI }}
          RESUME_RUN_ID: ${{ inputs.resume_run_id }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT: olympus-${{ needs.resolve.outputs.run_type }}
        run: |
          mkdir -p artifacts
          set -o pipefail

          MAX_OUTER_ATTEMPTS=3
          OUTER_BACKOFF=(0 300 900)
          attempt=1
          while : ; do
            sleep "${OUTER_BACKOFF[$((attempt-1))]}"
            echo "── Pipeline attempt ${attempt}/${MAX_OUTER_ATTEMPTS} (${RUN_TYPE}) ──"
            CMD=(python -m digiquant.olympus.hermes.chain
                 --run-type "${RUN_TYPE}"
                 --run-date "${RUN_DATE}")
            [ "${RUN_TYPE}" = "delta" ] && CMD+=(--auto-baseline)
            [ "${DRY_RUN:-}" = "true" ] && CMD+=(--dry-run)
            [ -n "${RESUME_RUN_ID:-}" ] && CMD+=(--resume-run-id "${RESUME_RUN_ID}")
            if "${CMD[@]}" 2>&1 | tee -a artifacts/run.log; then
              break
            fi
            if [ "${attempt}" -ge "${MAX_OUTER_ATTEMPTS}" ]; then
              echo "Pipeline failed after ${MAX_OUTER_ATTEMPTS} attempts."
              exit 1
            fi
            attempt=$((attempt + 1))
          done

      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: olympus-${{ needs.resolve.outputs.run_type }}-${{ needs.resolve.outputs.run_date }}
          path: artifacts/
          retention-days: ${{ needs.resolve.outputs.run_type == 'monthly' && 90 || 30 }}

      - name: Report pipeline failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID: ${{ github.run_id }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          TITLE="olympus-${RUN_TYPE}-failure"
          mkdir -p artifacts
          if [ -f artifacts/run.log ]; then
            tail -n 200 artifacts/run.log > artifacts/tail.log
          else
            printf '(no log captured)\n' > artifacts/tail.log
          fi

          FAILED_STEP=$(gh run view "$RUN_ID" --json jobs \
            --jq '[.jobs[] | select(.conclusion == "failure") | .steps[]? | select(.conclusion == "failure") | .name][0] // "unknown"' \
            2>/dev/null || echo "unknown")
          LAST_OK=$(gh run list --workflow="$WORKFLOW_NAME" --status=success --limit=1 \
            --json updatedAt --jq '.[0].updatedAt // "unknown"' 2>/dev/null || echo "unknown")

          LAST_OK_REL="never recorded"
          if [ "$LAST_OK" != "unknown" ]; then
            if LAST_OK_EPOCH=$(date -u -d "$LAST_OK" +%s 2>/dev/null); then
              DELTA_SEC=$(( $(date -u +%s) - LAST_OK_EPOCH ))
              if [ "$DELTA_SEC" -lt 86400 ]; then
                LAST_OK_REL="$(( DELTA_SEC / 3600 )) hours ago"
              else
                LAST_OK_REL="$(( DELTA_SEC / 86400 )) days ago"
              fi
            else
              LAST_OK_REL="age unknown"
            fi
          fi

          {
            printf 'Olympus %s run failed on %s.\n\n' "$RUN_TYPE" "$RUN_DATE"
            printf '**Failing step:** %s\n' "$FAILED_STEP"
            printf '**Last successful run:** %s (%s)\n' "$LAST_OK" "$LAST_OK_REL"
            printf '**Workflow run:** %s\n\n' "$RUN_URL"
            printf '**On-call:** see [RUNBOOK](%s/blob/develop/digiquant/src/digiquant/olympus/atlas/docs/RUNBOOK.md) §"Atlas job failure triage".\n\n' "$REPO_URL"
            printf '<details><summary>Last 200 log lines</summary>\n\n```\n'
            cat artifacts/tail.log
            printf '\n```\n\n</details>\n'
          } > artifacts/issue-body.md

          EXISTING=$(gh issue list --state open --search "$TITLE in:title" \
            --json number,title --jq '[.[] | select(.title == "'"$TITLE"'")][0].number' || echo "")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body-file artifacts/issue-body.md
          else
            gh issue create --title "$TITLE" --body-file artifacts/issue-body.md \
              --label "ci:failure"
          fi
