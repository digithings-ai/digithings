name: site-smoke

# Post-deploy smoke check for the static sites. Both digithings.ai and
# digiquant.io are Next.js static exports on Cloudflare Pages. The original
# #671 regression shipped because nothing ever fetched a non-HTML asset from
# production: the SPA fallback turned every missing path into a soft-200
# text/html response that MIME-blocked the asset. We keep probing one stable
# non-HTML asset per site (og.png) plus the homepages and a prerendered route.
#
# Verdicts per URL:
#   200 + expected content-type  -> pass
#   200 + text/html              -> FAIL (SPA fallback is masking a missing asset)
#   404 / 5xx                    -> FAIL
#   403 / 429                    -> warn only (Cloudflare bot challenge; inconclusive from CI IPs)

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Probe design assets and homepages
        id: probe
        run: |
          set -uo pipefail
          fail=0
          probe() {
            local url="$1" want_type="$2"
            local status ctype
            read -r status ctype < <(curl -sL -o /dev/null --max-time 20 \
              -A "digithings-site-smoke/1.0 (+https://github.com/digithings-ai/digithings)" \
              -w "%{http_code} %{content_type}\n" "$url" || echo "000 none")
            case "$status" in
              200)
                if [[ "$ctype" == *"$want_type"* ]]; then
                  echo "PASS  $url ($ctype)"
                elif [[ "$ctype" == *text/html* && "$want_type" != text/html ]]; then
                  echo "FAIL  $url returned text/html — SPA fallback is masking a missing asset"
                  fail=1
                else
                  echo "FAIL  $url returned unexpected content-type '$ctype' (wanted $want_type)"
                  fail=1
                fi ;;
              403|429)
                echo "WARN  $url -> $status (bot challenge; inconclusive from CI)" ;;
              *)
                echo "FAIL  $url -> HTTP $status"
                fail=1 ;;
            esac
          }
          # digithings.ai — Next.js static export (frontend/digithings-web).
          probe "https://digithings.ai/" "text/html"
          # Prerendered module route — build-asserted in build-digithings.sh.
          probe "https://digithings.ai/modules/digigraph/" "text/html"
          # Stable non-HTML asset (public/design/assets/og.png) — the canary for
          # the SPA-fallback MIME-masking regression #671 was written to catch.
          probe "https://digithings.ai/design/assets/og.png" "image/png"
          # digiquant.io — Next.js static export (frontend/digiquant-web) +
          # Olympus dashboard mounted at basePath /olympus.
          probe "https://digiquant.io/" "text/html"
          probe "https://digiquant.io/olympus/" "text/html"
          exit "$fail"

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="[site-smoke] production design assets failing"
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "in:title $TITLE" --json number --jq '.[0].number // empty')
          BODY="Scheduled smoke check found a broken asset path in production. See run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID — a probed URL 404'd or returned a soft-200 text/html SPA fallback (MIME masking, cf. #671)."
          if [[ -n "$EXISTING" ]]; then
            gh issue comment "$EXISTING" --repo "$GITHUB_REPOSITORY" --body "$BODY"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$TITLE" --label agent-task --label "component:website" --body "$BODY"
          fi
