name: score PR diff

on:
  workflow_call:
  pull_request:

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Score staged PR diff
        run: |
          python -m pip install -U pip
          git fetch origin "${{ github.base_ref }}"
          python3 scripts/score.py --diff "origin/${{ github.base_ref }}...HEAD"
