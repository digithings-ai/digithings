name: score PR diff

on:
  workflow_call:
  pull_request:

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Score staged PR diff
        run: |
          python -m pip install -U pip
          git fetch origin "${{ github.base_ref }}"
          git diff "origin/${{ github.base_ref }}...HEAD" -- . ':(exclude)docs/reviews/**' > /tmp/pr-code.diff || true
          if [ -s /tmp/pr-code.diff ]; then
            python3 scripts/score.py --diff-file /tmp/pr-code.diff
          else
            echo "score: no code diff outside docs/reviews"
          fi
