# Sitas – Self-contained Docker stack
# DigiGraph + DigiSearch + LiteLLM. No DigiQuant.
# Project-specific ports (8010, 8012, 4010) avoid conflicts with default stack.
#
# Usage: cd projects/sitaas && cp .env.example .env && docker compose up --build

services:
  digigraph:
    build:
      context: ../../digigraph
      dockerfile: Dockerfile
    image: digi-digigraph:latest
    container_name: sitas-digigraph
    ports:
      # Bind to all interfaces so Open WebUI (Docker) can reach via host.docker.internal
      - "${DIGIGRAPH_PORT:-8010}:8000"
    env_file:
      - .env
    environment:
      - DIGI_PROJECT_CONFIG=/app/digi_project.yaml
      - DIGI_CONFIG_PATH=/app/config
      - DIGISEARCH_URL=http://digisearch:8002
      - OPENAI_API_BASE=http://litellm:4000/v1
      - DIGI_LLM_MODE=${DIGI_LLM_MODE:-test}
      - PYTHONUNBUFFERED=1
      - AUDIT_LOG_PATH=/tmp/audit/events.jsonl
    volumes:
      - ../../config:/app/config:ro
      - ./config.yaml:/app/digi_project.yaml:ro
      - sitas-audit:/tmp/audit
      - sitas-run-data:/data/run
    depends_on:
      digisearch:
        condition: service_healthy
      litellm:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  digisearch:
    build:
      context: ../../digisearch
      dockerfile: Dockerfile
    image: digi-digisearch:latest
    container_name: sitas-digisearch
    ports:
      - "127.0.0.1:${DIGISEARCH_PORT:-8012}:8002"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DIGISEARCH_INDEX=unified-content-index
      - DIGISEARCH_INDEX_CONFIG=/app/indexes/unified-content-index.yaml
    volumes:
      - ./indexes:/app/indexes:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: sitas-litellm
    ports:
      - "127.0.0.1:${LITELLM_PORT:-4010}:4000"
    env_file:
      - .env
    environment:
      - CONFIG_FILE_PATH=/app/config/litellm.yaml
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
    volumes:
      - ../../config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  sitas-audit:
  sitas-run-data:
