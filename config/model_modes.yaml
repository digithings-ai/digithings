# Legacy DigiGraph mode defaults (test / medium / best) + optional per-phase overrides.
#
# Atlas/Hermes phase routing is centralized in config/olympus_models.yaml
# (capability tier × OLYMPUS_MODEL_TIER). Entries here override that policy when
# you need to pin a model for a single phase — frontier models (openai/*, anthropic/*,
# GPT-5.x, Claude Opus/Sonnet, o-series) are rejected at runtime; see model_config.py.
#
# Provider routing (automatic from the model string prefix):
#   openrouter/…       → OPENROUTER_API_KEY → https://openrouter.ai/api/v1
#   gemini/…           → GEMINI_API_KEY     → Google OpenAI-compat endpoint
#   ollama-cloud/…     → OPENAI_API_KEY     → Ollama Cloud (OPENAI_API_BASE)
#   xai/…              → XAI_API_KEY        → https://api.x.ai/v1 (OpenAI-compat)
#
# Local dev: DIGI_MODEL_MODES_FILE=model_modes.local.yaml + OPENAI_API_BASE.

defaults:
  test: ollama/qwen3:8b
  medium: ollama/qwen3:8b
  best: ollama/qwen3:8b

# Optional per-phase overrides — empty by default; olympus_models.yaml owns routing.
phase_models:
  # #1006: pin H6 deliberation to deepseek-chat. The cheap ``research`` pool also holds
  # llama-4-maverick, which returns empty completions under STRICT json_schema — so the
  # ~40% of watchlist tickers that hashed onto it failed json.loads at char 0
  # (DeliberationPmTurn / DeliberationAnalystTurn). deepseek-chat is the json/tool-reliable
  # open-weight model already in the pool; the trailing '-' makes this a prefix match for
  # every per-ticker slug (hermes/portfolio/deliberation-{ticker}) emitted by h6_deliberation.
  hermes/portfolio/deliberation-: openrouter/deepseek/deepseek-chat
  # #1559/#1622: pin Phase-7 master-digest. First pinned to deepseek-chat when the
  # ``reasoning`` pool hash landed on deepseek-r1, whose chain-of-thought output is not
  # reliably strict JSON (2026-07-18 delta digest JSONDecodeError → prior digest carried).
  # Repointed to deepseek-v4-flash (#1622): 1M-token context removes the 64k synthesis
  # ceiling entirely (the #1559 input budget stays as a cost bound), at half the price.
  # Kept as a pin (not a pool hash) so digest routing stays deterministic.
  master-digest: openrouter/deepseek/deepseek-v4-flash
