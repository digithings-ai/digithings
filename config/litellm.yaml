litellm_settings:
  drop_params: true
  # Proxy-side response cache (local disk-backed by default). DigiGraph also has in-process
  # DIGI_LLM_CACHE_* — see digigraph/ARCHITECTURE.md and config/MODELS.md.
  cache: true
  cache_params:
    type: local
    ttl: 3600
  num_retries: 2
  request_timeout: 120

general_settings: {}
