# LiteLLM router config – Digi Ecosystem (Phase 1+)
# DigiGraph calls LiteLLM at http://litellm:4000/v1.
# Model selection: set DIGI_LLM_MODE=test|medium|best (default: test for minimal tokens).
# Agents: when adding models, update config/model_modes.yaml and config/MODELS.md.
#
# Docker default: strict routing (no model fallbacks). For Ollama fallback behavior,
# use litellm.dev.yaml (set LITELLM_CONFIG in compose or override the command — see DOCKER.md).
# Redis-backed cache: profile `litellm-cache`, REDIS_URL, switch cache_params.type (DOCKER.md).

model_list:
  # OpenAI (optional; set OPENAI_API_KEY in .env for LiteLLM container — upstream provider)
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # ─── Ollama Cloud (free tier; OLLAMA_API_KEY at ollama.com/settings/keys) ───
  # Updated 2026-04-24. Model catalog: https://ollama.com/search?c=cloud

  # ── best tier ──────────────────────────────────────────────────────────────
  # DeepSeek V4 Flash: 284B MoE (13B active), 1M ctx, LiveCodeBench 91.6% — new default best
  - model_name: ollama-cloud/deepseek-v4-flash:cloud
    litellm_params:
      model: openai/deepseek-v4-flash:cloud
      api_base: https://ollama.com/v1
      api_key: os.environ/OLLAMA_API_KEY

