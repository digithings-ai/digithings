# Olympus (Atlas + Hermes) — centralized model tier policy.
#
# Single source of truth for per-phase model selection and OpenRouter cost knobs.
# Override the active tier at runtime: OLYMPUS_MODEL_TIER=cheap|balanced|quality
#
# ── OPENROUTER ROUTING (Jun 2026) ───────────────────────────────────────────
# Per-tier ``allowed_models`` pools (NOT single-model pins). Phase routing picks
# deterministically from the capability pool via hash(phase_slug). Every model in
# every pool MUST support BOTH OpenRouter function tools (query_data, query_research)
# AND web search — use the ``:online`` suffix only (built-in web search plugin).
# Do NOT add perplexity/sonar or other native-search-only models: they lack tool use
# and cause OpenRouter 404 "No endpoints found that support tool use". Grounding
# uses ``web_search_models`` from the same ``:online`` set.
#
# Auto Router knobs (``openrouter_defaults``) apply when a call uses openrouter/auto
# or OPENROUTER_FALLBACK_MODELS — digillm injects:
#   plugins[{ id: auto-router, allowed_models, cost_quality_tradeoff }]
#
# Web grounding: ``:online`` models use built-in web search (no openrouter:web_search
# server tool). Fail-hard when unavailable: OLYMPUS_WEB_SEARCH=required.
# Structured JSON: response_format json_schema + strict:true on pool models.
#
# Env contract (unchanged): OPENROUTER_API_KEY only — apply_olympus_openrouter_env()
# sets OPENROUTER_ALLOWED_MODELS + OPENROUTER_COST_QUALITY_TRADEOFF at chain startup.
#
# ── PRICING (OpenRouter pass-through, per 1M tokens, Jun 2026) ─────────────
#   deepseek-chat:online              $0.20 in / $0.80 out  [structured_outputs ✓, tools ✓, web ✓]
#   llama-4-maverick:online           $0.15 in / $0.60 out  [structured_outputs ✓, tools ✓, web ✓]
#   deepseek-r1:online                $0.70 in / $2.50 out  [structured_outputs ✓, tools ✓, web ✓]

default_tier: cheap

# Global OpenRouter Auto Router knobs — inherited by every tier unless overridden.
openrouter_defaults:
  allowed_models: "deepseek/*,meta-llama/*,mistralai/*,nvidia/*,google/gemma*"
  cost_quality_tradeoff: 10

tiers:
  cheap:
    allowed_models:
      extraction:
        - "openrouter/deepseek/deepseek-chat:online"
      research:
        - "openrouter/deepseek/deepseek-chat:online"
      reasoning:
        - "openrouter/deepseek/deepseek-chat:online"
    web_search_models:
      - "openrouter/deepseek/deepseek-chat:online"

  balanced:
    allowed_models:
      extraction:
        - "openrouter/deepseek/deepseek-chat:online"
      research:
        - "openrouter/deepseek/deepseek-chat:online"
        - "openrouter/meta-llama/llama-4-maverick:online"
      reasoning:
        - "openrouter/meta-llama/llama-4-maverick:online"
        - "openrouter/deepseek/deepseek-r1:online"
    web_search_models:
      - "openrouter/deepseek/deepseek-chat:online"
      - "openrouter/meta-llama/llama-4-maverick:online"

  quality:
    allowed_models:
      extraction:
        - "openrouter/deepseek/deepseek-chat:online"
      research:
        - "openrouter/deepseek/deepseek-chat:online"
        - "openrouter/deepseek/deepseek-r1:online"
      reasoning:
        - "openrouter/deepseek/deepseek-r1:online"
        - "openrouter/meta-llama/llama-4-maverick:online"
    web_search_models:
      - "openrouter/deepseek/deepseek-chat:online"
      - "openrouter/deepseek/deepseek-r1:online"

phase_capabilities:
  macro: research
  bonds: research
  commodities: research
  forex: research
  crypto: research
  international: research
  equity: research
  risk-aggressive: research
  risk-conservative: research
  phase9-evolution: research
  decision-reflector: research
  pm-rebalance: reasoning
