name: Daily Price Update

# Runs each trading day at 00:00 UTC (GitHub Actions cron is UTC-only).
# That is ~8:00 PM Eastern during EDT and ~7:00 PM Eastern during EST — still
# well after US cash close; also lines up with the common UTC-day boundary for
# 24/7 markets (e.g. crypto daily bars at 00:00 UTC).
# Manual "Run workflow" uses the same steps as the schedule (no extra inputs).
on:
  schedule:
    - cron: "0 0 * * 1-5"   # Mon–Fri 00:00 UTC
  workflow_dispatch:

jobs:
  update-prices:
    name: Fetch & Upsert Price History
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Gap-fill from latest Supabase date per watchlist ticker to UTC today;
      # tickers with no rows get a full-history pull (default --new-ticker-period max).
      - name: Sync price history (watchlist)
        run: |
          python3 scripts/preload-history.py --supabase --supabase-sync

      # 7 days covers: Mon catching up Fri's row, rolling indicators that depend
      # on prior values (MACD histogram, Stochastic), and any weekend data gaps.
      - name: Compute TA indicators
        run: |
          python3 scripts/compute-technicals.py \
            --days 7 \
            --supabase

      # Macro / FX / sentiment / Treasury (see RUNBOOK, config/macro_series.yaml).
      - name: Ingest macro & Treasury
        run: |
          if [ -n "${FRED_API_KEY:-}" ]; then
            python3 scripts/ingest_fred.py --supabase
          else
            echo "::warning::FRED_API_KEY not set — skipping FRED ingest"
          fi
          python3 scripts/ingest_fx_frankfurter.py --supabase
          python3 scripts/ingest_crypto_fng.py --supabase
          python3 scripts/ingest_treasury_curve.py --supabase

      # Aligns positions metrics, nav_history, portfolio_metrics with price_history closes
      # (see scripts/refresh_performance_metrics.py).
      - name: Refresh portfolio performance metrics
        run: |
          python3 scripts/refresh_performance_metrics.py --supabase --fill-calendar-through "$(date -u +%Y-%m-%d)"

      - name: Verify row counts
        run: |
          python3 - <<'EOF'
          import os
          from supabase import create_client
          sb = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_SERVICE_KEY"])
          ph = sb.table("price_history").select("ticker", count="exact").execute()
          pt = sb.table("price_technicals").select("ticker", count="exact").execute()
          print(f"✅ price_history:    {ph.count} rows")
          print(f"✅ price_technicals: {pt.count} rows")
          try:
              mo = sb.table("macro_series_observations").select("source", count="exact").execute()
              mx = (
                  sb.table("macro_series_observations")
                  .select("obs_date")
                  .order("obs_date", desc=True)
                  .limit(1)
                  .execute()
              )
              latest = (mx.data or [{}])[0].get("obs_date") if getattr(mx, "data", None) else None
              print(f"✅ macro_series_observations: {mo.count} rows (latest obs_date={latest})")
          except Exception as e:
              print(f"⚠️  macro_series_observations: {e}")
          EOF
