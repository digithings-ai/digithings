# Gitleaks configuration for digithings.
#
# Policy: extend the default ruleset (detect-secrets for AWS/GCP/Azure, JWTs,
# generic API keys, PEM private keys, etc.) and allowlist a small, reviewed
# set of paths that contain test fixtures, documentation examples, and
# placeholder values. Adding a new allowlist entry requires a brief comment
# explaining why the match is safe (see SECURITY.md "Secrets scanning").

# Inherit every rule from gitleaks' built-in default config. Custom rules
# below (if any) are additive.
[extend]
useDefault = true

[allowlist]
description = "digithings fixtures, docs, and placeholder values"

paths = [
  # Unit + integration test fixtures: fake JWTs minted at runtime via
  # tests/digi_test_jwt.py, ephemeral RSA keys generated by conftest.py, and
  # canned payloads under tests/fixtures/. No production secrets live here.
  '''^tests/''',

  # Template .env — contains only keys and empty/placeholder values. Enforced
  # by convention; a real .env is gitignored.
  '''^\.env\.example$''',

  # Documentation commonly includes example tokens, JWT structure samples,
  # and curl snippets with obviously-fake bearer values (e.g. "sk-your-key").
  '''^docs/.*\.md$''',

  # Claude Code PreToolUse hook fixtures (protected-path-guard, etc.): these
  # may carry canned inputs resembling secrets for hook unit tests.
  '''^scripts/claude-hooks/fixtures/''',

  # Top-level README and top-level markdown examples mirror the docs/ policy.
  '''^[A-Z]+\.md$''',
]

# Known-safe example/dummy tokens that gitleaks' default rules flag. Each
# entry must be a canonical AWS/GitHub/etc. "EXAMPLE" value published by the
# vendor, never a real leaked secret.
regexes = [
  # AWS documentation example access key id (literally "AKIAIOSFODNN7EXAMPLE").
  '''AKIAIOSFODNN7EXAMPLE''',
  # AWS documentation example secret (literally
  # "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY").
  '''wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY''',
]

# Commit-level allowlist. Entries must be full SHAs with a dated comment
# describing (a) why the commit is safe and (b) whether any credential it
# referenced has been rotated. Never allowlist a commit without rotating
# first (see SECURITY.md "Secrets scanning").
commits = [
  # 2026-04: smoke-test commits on the gitleaks-CI introduction PR (#68).
  # Three commits form the full smoke-test cycle — introduce, mutate, delete —
  # all containing only synthetic AWS-shaped strings that were never real
  # credentials. Specific payloads per commit:
  #   0b076c8 — introduced leaktest-smoke.txt with AKIAIOSFODNN7FAKEKEY1 and
  #              abcd1234wJalrXUtnFEMI/K7MDENG/bPxRfiCYFAKEAAAA
  #   2832d60 — mutated the file to AKIAZ7VQXYLMNOPQRSTU
  #   41b291b — deleted leaktest-smoke.txt entirely (reverted smoke test)
  # The workflow intentionally failed on 0b076c8/2832d60 then passed on
  # 41b291b, proving end-to-end detection. The file is absent at HEAD.
  # No rotation needed — these were never real credentials (see SECURITY.md).
  "0b076c8058e823ae723e76bf338109a8e7895707",
  "2832d60d70dd9b6c6409b7bd4d387e613187cad7",
  "41b291b19acc6053f3cfc778b997eebcd31611e8",

  # 2026-04: backlog-reorg tooling PR (#323). Commit 3ed49c4 added
  # file-children.py with a literal `"key": "296-jwt-claims"` dict entry that
  # tripped gitleaks' generic-api-key rule. The string is a task-identifier
  # slug, not a credential. Follow-up commit renamed the field `key` → `slug`
  # so HEAD no longer matches the rule, but gitleaks scans historical diffs
  # and still flags the introducing commit. No rotation needed —
  # "296-jwt-claims" was never a secret.
  "3ed49c426d38c5e7ed91be48e8f71a5cee9fe9ae",
]
