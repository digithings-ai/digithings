# Gitleaks configuration for digithings.
#
# Policy: extend the default ruleset (detect-secrets for AWS/GCP/Azure, JWTs,
# generic API keys, PEM private keys, etc.) and allowlist a small, reviewed
# set of paths that contain test fixtures, documentation examples, and
# placeholder values. Adding a new allowlist entry requires a brief comment
# explaining why the match is safe (see SECURITY.md "Secrets scanning").

# Inherit every rule from gitleaks' built-in default config. Custom rules
# below (if any) are additive.
[extend]
useDefault = true

[allowlist]
description = "digithings fixtures, docs, and placeholder values"

paths = [
  # Unit + integration test fixtures: fake JWTs minted at runtime via
  # tests/digi_test_jwt.py, ephemeral RSA keys generated by conftest.py, and
  # canned payloads under tests/fixtures/. No production secrets live here.
  '''^tests/''',

  # Template .env — contains only keys and empty/placeholder values. Enforced
  # by convention; a real .env is gitignored.
  '''^\.env\.example$''',

  # Documentation commonly includes example tokens, JWT structure samples,
  # and curl snippets with obviously-fake bearer values (e.g. "sk-your-key").
  '''^docs/.*\.md$''',

  # Claude Code PreToolUse hook fixtures (protected-path-guard, etc.): these
  # may carry canned inputs resembling secrets for hook unit tests.
  '''^scripts/claude-hooks/fixtures/''',

  # Top-level README and top-level markdown examples mirror the docs/ policy.
  '''^[A-Z]+\.md$''',
]

# Known-safe example/dummy tokens that gitleaks' default rules flag. Each
# entry must be a canonical AWS/GitHub/etc. "EXAMPLE" value published by the
# vendor, never a real leaked secret.
regexes = [
  # AWS documentation example access key id (literally "AKIAIOSFODNN7EXAMPLE").
  '''AKIAIOSFODNN7EXAMPLE''',
  # AWS documentation example secret (literally
  # "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY").
  '''wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY''',
]

# Commit-level allowlist: none currently. If a historical commit carried a
# since-rotated credential, list its short SHA here with a dated comment.
commits = []
